<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Cuckoo Nest</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ef4444">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background: #0f172a; 
            color: white; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        #sidebar { 
            width: 340px; 
            background: #1e293b; 
            border-right: 1px solid #334155; 
            display: flex; 
            flex-shrink: 0; 
            position: relative;
            z-index: 9999;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #sidebar.collapsed {
            margin-left: -340px;
        }

        .sidebar-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            width: 100%;
            box-sizing: border-box;
        }

        .toggle-tab-app {
            position: absolute;
            left: 100%;
            top: 15%;
            transform: translateY(-50%);
            background: #1e293b;
            color: #94a3b8;
            padding: 20px 6px;
            cursor: pointer;
            border-radius: 0 8px 8px 0;
            z-index: 10000;
            font-weight: bold;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            border: 1px solid #334155;
            border-left: none;
            box-shadow: 4px 0 6px rgba(0,0,0,0.4);
            transition: 0.2s;
            white-space: nowrap;
        }
        
        .toggle-tab-app:hover {
            background: #ef4444; /* Rosso CCN */
            color: white;
            border-color: #f87171;
        }

        #sidebar.collapsed .toggle-tab-app { 
            width: auto;
            height: auto;
            white-space: nowrap;
            padding: 20px 6px;
            display: block;
        }
        
        #main { 
            flex-grow: 1; 
            padding: 20px; 
            overflow-y: auto; 
            background: #0f172a; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            position: relative; 
        }
        
        .card { 
            background: #1e293b; 
            border-radius: 8px; 
            padding: 12px; 
            border: 1px solid #334155; 
        }

        label { 
            font-size: 10px; 
            color: #94a3b8; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin-bottom: 5px; 
            display: block; 
        }

        input, select { 
            width: 100%; 
            padding: 8px; 
            background: #0f172a; 
            border: 1px solid #334155; 
            color: white; 
            border-radius: 4px; 
            box-sizing: border-box; 
            margin-bottom: 5px; 
        }

        .grid-3 { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 8px; 
        }

        .grid-2 { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 8px; 
        }

        button { 
            cursor: pointer; 
            padding: 10px; 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
            width: 100%; 
            transition: 0.2s; 
            margin-top: 5px; 
        }

        .btn-primary { background: #3b82f6; color: white; }
        .btn-success { background: #10b981; color: white; border: 2px solid #059669; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-compact { background: #0ea5e9; color: white; border: 1px solid #0284c7; }
        .btn-ai { background: #8b5cf6; color: white; border: 1px solid #7c3aed; }
        .btn-export { background: #22c55e; color: white; border: 1px solid #16a34a; }
        
        .trip-card { 
            background: #ffffff; 
            border-radius: 12px; 
            color: #1e293b; 
            overflow: hidden; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); 
            display: flex; 
            flex-direction: column; 
        }

        .trip-header { 
            padding: 10px 20px; 
            background: #f1f5f9; 
            border-bottom: 1px solid #e2e8f0; 
            font-weight: bold; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        .trip-body { 
            display: flex; 
            width: 100%; 
            height: 50vh; 
            min-height: 400px; 
        } 
        
        .canvas-3d { 
            flex: 1; 
            position: relative; 
            background: #f8fafc; 
            border-right: 1px solid #e2e8f0; 
            overflow: hidden; 
        }

        .canvas-2d { 
            flex: 2; 
            position: relative; 
            background: #f8fafc; 
            overflow: hidden; 
        }
        
        .fullscreen-active { 
            position: fixed !important; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            width: 100vw !important; 
            height: 100vh !important; 
            z-index: 9999 !important; 
            background: #f8fafc !important; 
        }
        
        #log { 
            font-size: 11px; 
            color: #10b981; 
            font-family: monospace; 
            background: #000; 
            padding: 10px; 
            border-radius: 4px; 
            height: 50px; 
            overflow-y: auto; 
            flex-shrink: 0;
        }

        .modal-overlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(15, 23, 42, 0.85); 
            z-index: 10000; 
            justify-content: center; 
            align-items: center; 
            backdrop-filter: blur(4px); 
        }

        .modal-content { 
            background: #1e293b; 
            border: 1px solid #3b82f6; 
            border-radius: 12px; 
            padding: 25px; 
            max-width: 1100px; 
            width: 95%; 
            max-height: 90vh; 
            overflow-y: auto; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        .modal-content h2 { margin-top: 0; color: #3b82f6; }
        
        .print-only { display: none; }
        
        .print-list-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 10px; 
            margin-top: 5px; 
            color: #1e293b; 
        }
        
        .print-list-table th, .print-list-table td { 
            border: 1px solid #cbd5e1; 
            padding: 4px 8px; 
            text-align: left; 
        }
        
        .print-list-table th { 
            background-color: #f1f5f9; 
            font-weight: bold; 
        }

        /* REGOLE DI STAMPA */
        @media print {
            @page { size: landscape; margin: 10mm; }
            body, html, #main { 
                display: block !important; 
                overflow: visible !important; 
                height: auto !important; 
                background: white !important; 
                padding: 0 !important; 
                margin: 0 !important; 
            }
            
            #sidebar, #showSidebarBtn, .print-hide, .modal-overlay { 
                display: none !important; 
            }
            
            .trip-card { 
                page-break-inside: avoid; 
                page-break-after: always; 
                border: 2px solid #cbd5e1 !important; 
                box-shadow: none !important; 
                margin-bottom: 20px; 
                display: block; 
            }
            
            .trip-card:last-child { 
                page-break-after: auto; 
            }
            
            .trip-body { 
                display: flex !important; 
                flex-direction: row !important; 
                align-items: stretch !important; 
                height: 130mm !important; 
                min-height: unset !important; 
                padding: 5mm !important; 
                box-sizing: border-box; 
            }
            
            .canvas-3d { 
                flex: 0 0 55% !important; 
                border-right: 2px dashed #cbd5e1 !important; 
                background: white !important; 
                padding-right: 5mm; 
            }
            
            .canvas-3d canvas { 
                width: 100% !important; 
                height: 100% !important; 
                object-fit: contain !important; 
            }
            
            .canvas-2d { 
                flex: 1 !important; 
                border: none !important; 
                background: white !important; 
                overflow: hidden !important; 
                padding-left: 5mm; 
            }
            
            .canvas-2d canvas { 
                height: 100% !important; 
                width: auto !important; 
                max-width: none !important; 
                object-position: left top !important; 
            }
            
            .fullscreen-active { 
                position: relative !important; 
                width: auto !important; 
                height: 100% !important; 
            }
            
            body { 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
            }
            
            .print-only { 
                display: block !important; 
            }
        }

        .trip-vehicle-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            font-weight: normal;
        }

        .trip-vehicle-controls select {
            width: auto;
            padding: 4px;
            margin: 0;
            background: #fff;
            color: #1e293b;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 11px;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="toggle-tab-app" onclick="toggleSidebar()">LOGISTICA</div>
    <div class="sidebar-content">
        
    
    <div class="card">
        <label>Impostazioni Vano di Carico Predefinito (cm)</label>
        <p style="font-size: 9px; color: #64748b; margin-top: 0;">Usato per i nuovi viaggi in Auto-Nesting</p>
        <select id="capienzaPreset" onchange="loadCapienzaPreset()" style="margin-bottom: 8px;">
            <optgroup label="Mezzi Stradali">
                <option value="1">Furgone medio</option>
                <option value="2">Furgone grande</option>
                <option value="3" selected>Box 35q</option>
                <option value="4">Camion 7.5 t</option>
                <option value="5">Camion 18 t</option>
                <option value="6">Semirimorchio</option>
                <option value="7">Mega trailer</option>
            </optgroup>
            <optgroup label="Imbarcazioni">
                <option value="8">Barca 1</option>
                <option value="9">Barca 2</option>
                <option value="10">Barca 3</option>
                <option value="11">Barca 4</option>
            </optgroup>
        </select>
        <div class="grid-3">
            <div>
                <label style="color: #64748b; margin-bottom: 2px;">Larghezza</label>
                <input type="number" id="bL" onchange="saveCapienzaPreset()" title="Larghezza">
            </div>
            <div>
                <label style="color: #64748b; margin-bottom: 2px;">Lunghezza</label>
                <input type="number" id="bP" onchange="saveCapienzaPreset()" title="Lunghezza">
            </div>
            <div>
                <label style="color: #64748b; margin-bottom: 2px;">Altezza</label>
                <input type="number" id="bH" onchange="saveCapienzaPreset()" title="Altezza">
            </div>
        </div>
        
        <label style="margin-top: 10px;">Margini Operativi (cm)</label>
        <div class="grid-3">
            <input type="number" id="mL" value="4">
            <input type="number" id="mP" value="4">
            <input type="number" id="mH" value="5">
        </div>
    </div>

    
    <div class="card" style="border-left: 4px solid #3b82f6;">
        <label style="color: #60a5fa;">Aggiungi Cassa Singola (CM)</label>
        <div class="grid-3">
            <div>
                <input type="number" id="manL" value="100">
                <div style="font-size: 9px; color: #64748b; text-align: center;">L (cm)</div>
            </div>
            <div>
                <input type="number" id="manP" value="80">
                <div style="font-size: 9px; color: #64748b; text-align: center;">P (cm)</div>
            </div>
            <div>
                <input type="number" id="manH" value="60">
                <div style="font-size: 9px; color: #64748b; text-align: center;">H (cm)</div>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr 32px; gap: 8px; margin-top: 5px;">
            <input type="number" id="manPeso" placeholder="Peso (KG)">
            <button class="btn-primary" style="margin-top: 0; padding: 8px;" onclick="aggiungiCassaManuale()">➕ AGGIUNGI</button>
            <button id="btnGlobalFlag" style="margin-top: 0; padding: 0; width: 100%; height: 100%; border: 1px solid #cbd5e1; border-radius: 4px; cursor: pointer; background: transparent;" onclick="toggleGlobalBanchinaFlag()" title="Cambia vincolo a tutte le casse in banchina"></button>
        </div>
    </div>

    <div class="card print-hide" style="border-left: 4px solid #10b981;">
        <button class="btn-success" onclick="rifaiNestingAuto()">AUTO NESTING</button>
        <button class="btn-warning" style="background: #f59e0b; margin-top: 8px;" onclick="scaricaTutto()">📥 SCARICA TUTTO IN BANCHINA</button>
        <button class="btn-warning print-hide" onclick="undoMove()">↩️ ANNULLA SPOSTAMENTO</button>
    </div>

    <div id="log" class="print-hide">> Ambiente pronto. Premi Ctrl+Z per annullare.</div>
    
    <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 5px;">
        <button class="btn-export print-hide" style="background: #10b981; color: white;" onclick="exportDataExcel()">📊 ESPORTA TABELLA</button>
        <button onclick="window.print()" class="print-hide" style="background: #10b981; color: white;">🖨️ STAMPA PDF</button>
        
    </div>
    </div>
</div>

<div id="main">
    <div id="trips-container" style="display: flex; flex-direction: column; gap: 20px;"></div>
</div>

<script>
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('collapsed');
    setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 300);
}

let itemsMaster = [];
let viaggi = [];
let p5Instances = [];
let tripCameras = {};
let tripXray = {};

let activeFullscreenTrip = -1;
let moveHistory = []; 
let cassaIdCounter = 1;
let globalBanchinaStackMode = 0;

// PRESETS CAPIENZA
let capienzaPresets = {
    "1": { L: 175, P: 300, H: 180, nome: "Furgone medio" },
    "2": { L: 175, P: 420, H: 200, nome: "Furgone grande" },
    "3": { L: 210, P: 430, H: 210, nome: "Box 35q" },
    "4": { L: 245, P: 610, H: 240, nome: "Camion 7.5 t" },
    "5": { L: 245, P: 820, H: 260, nome: "Camion 18 t" },
    "6": { L: 245, P: 1360, H: 270, nome: "Semirimorchio" },
    "7": { L: 245, P: 1360, H: 300, nome: "Mega trailer" },
    "8": { L: 240, P: 700, H: 350, nome: "Barca 1" },
    "9": { L: 240, P: 700, H: 350, nome: "Barca 2" },
    "10": { L: 240, P: 700, H: 350, nome: "Barca 3" },
    "11": { L: 240, P: 700, H: 350, nome: "Barca 4" }
};

window.onload = () => { 
    initCapienza();
    updateGlobalFlagButton();
    checkTransferQueue(); 
    renderAll(); 
};

// ==========================================
// ASCOLTO CODA DI TRASFERIMENTO DA CCE/CCB
// ==========================================
window.addEventListener('storage', function(e) {
    if (e.key === 'cuckoo_nest_transfer_queue') {
        checkTransferQueue();
    }
});

function checkTransferQueue() {
    let queueStr = localStorage.getItem('cuckoo_nest_transfer_queue');
    if (queueStr) {
        try {
            let queue = JSON.parse(queueStr);
            if (queue.length > 0) {
                saveState(); 
                itemsMaster = itemsMaster.concat(queue);
                localStorage.removeItem('cuckoo_nest_transfer_queue'); 
                writeLog(`${queue.length} casse importate in automatico da Produzione!`, "#3b82f6");
                renderAll();
            }
        } catch(e) { console.error("Errore lettura coda da CCB"); }
    }
}

let isPrintingPDF = false;
window.matchMedia('print').addEventListener('change', (e) => { 
    isPrintingPDF = e.matches; 
});

document.addEventListener('keydown', function(event) {
    if ((event.ctrlKey || event.metaKey) && event.key === 'z') {
        event.preventDefault();
        undoMove();
    }
});

// ==========================================
// FUNZIONI UI E CAPIENZA
// ==========================================
function writeLog(m, col = "#10b981") {
    let l = document.getElementById('log');
    l.innerHTML = `<div style="color:${col}; margin-bottom: 3px;">> ${m}</div>` + l.innerHTML;
}

function initCapienza() {
    let saved = localStorage.getItem('cuckoo_nest_capienza_presets');
    if(saved) {
        let parsed = JSON.parse(saved);
        // Preserva i nuovi mezzi aggiunti anche se localStorage aveva solo i vecchi
        for(let key in parsed) {
            if(capienzaPresets[key]) {
                capienzaPresets[key].L = parsed[key].L;
                capienzaPresets[key].P = parsed[key].P;
                capienzaPresets[key].H = parsed[key].H;
            }
        }
    }
    let lastUsed = localStorage.getItem('cuckoo_nest_last_preset') || "3";
    if (!capienzaPresets[lastUsed]) lastUsed = "3";
    document.getElementById('capienzaPreset').value = lastUsed;
    loadCapienzaPreset(false);
}

function loadCapienzaPreset(saveSelection = true) {
    let val = document.getElementById('capienzaPreset').value;
    document.getElementById('bL').value = capienzaPresets[val].L;
    document.getElementById('bP').value = capienzaPresets[val].P;
    document.getElementById('bH').value = capienzaPresets[val].H;
    if(saveSelection) {
        localStorage.setItem('cuckoo_nest_last_preset', val);
    }
    renderAll();
}

function saveCapienzaPreset() {
    let val = document.getElementById('capienzaPreset').value;
    capienzaPresets[val].L = parseFloat(document.getElementById('bL').value) || 210;
    capienzaPresets[val].P = parseFloat(document.getElementById('bP').value) || 430;
    capienzaPresets[val].H = parseFloat(document.getElementById('bH').value) || 210;
    localStorage.setItem('cuckoo_nest_capienza_presets', JSON.stringify(capienzaPresets));
    renderAll();
}

// Funzione chiamata quando l'utente cambia il selettore veicolo per un viaggio specifico
function setTripVehicle(tripId, presetKey) {
    let trip = viaggi.find(v => v.id === tripId);
    if(trip) {
        saveState();
        trip.vehiclePreset = presetKey;
        
        let presetData = capienzaPresets[presetKey];
        trip.L = presetData.L;
        trip.P = presetData.P;
        trip.H = presetData.H;
        
        writeLog(`Vano per il Viaggio #${tripId+1} impostato su ${presetData.nome} (${presetData.L}x${presetData.P}x${presetData.H})`);
        
        // Rimanda in banchina le casse allocate per ricalcolare con il nuovo veicolo
        itemsMaster.forEach(i => { 
            if (!i.isEntity && !i.manual) {
                i.trip = -1; 
                i.isChild = false; 
                i.x = 9999; 
                i.y = 9999;
                i.z = 0; 
            }
        });
        
        setTimeout(() => { 
            eseguiNesting(); 
        }, 50);
    }
}


// ==========================================
// GESTIONE UNDO E AGGIUNTA MANUALE
// ==========================================
function saveState() {
    let currentStateStr = JSON.stringify(itemsMaster);
    if (moveHistory.length > 0 && moveHistory[moveHistory.length - 1] === currentStateStr) {
        return; 
    }
    if (moveHistory.length > 50) {
        moveHistory.shift(); 
    }
    moveHistory.push(currentStateStr);
}

function scaricaTutto() {
    // Verifichiamo se ci sono effettivamente casse caricate
    let casseCaricate = itemsMaster.filter(i => i.trip !== -1 && !i.isEntity);
    
    if (casseCaricate.length === 0) {
        alert("I camion sono già vuoti!");
        return;
    }

    if (confirm(`Vuoi scaricare tutte le ${casseCaricate.length} casse e riportarle in banchina?`)) {
        // Scattiamo una foto per il Ctrl+Z
        saveState(); 

        itemsMaster.forEach(i => {
            if (!i.isEntity) {
                i.trip = -1;     // Riporta in banchina
                i.manual = false; // Rimuove forzature manuali
                i.isChild = false; // Smonta eventuali impilamenti
                i.x = 9999;      // Coordinate di banchina
                i.y = 9999;
                i.z = 0;
            }
        });

        // Svuotiamo l'array dei viaggi attivi
        viaggi = [];

        writeLog("Logistica: Camion svuotati. Tutte le casse sono in banchina.", "#f59e0b");
        
        // Ridisegniamo tutto (questo aggiornerà anche CCE e CCV in automatico)
        renderAll();
    }
}

function undoMove() {
    if (moveHistory.length > 0) {
        let lastStateStr = moveHistory.pop();
        itemsMaster = JSON.parse(lastStateStr);
        
        // Ristruttura l'array dei viaggi preservando le impostazioni dei veicoli
        let tripMap = {};
        
        itemsMaster.forEach(i => {
            if (i.trip !== -1) {
                if(!tripMap[i.trip]) {
                    // Cerca di recuperare la configurazione veicolo precedente per quel trip, se esiste
                    let existingTrip = viaggi.find(v => v.id === i.trip);
                    tripMap[i.trip] = {
                        items: [],
                        vehiclePreset: existingTrip ? existingTrip.vehiclePreset : "3"
                    };
                }
                tripMap[i.trip].items.push(i);
            }
        });
        
        viaggi = [];
        for (let key in tripMap) {
            let tripData = tripMap[key];
            let vPreset = tripData.vehiclePreset;
            if(!capienzaPresets[vPreset]) vPreset = "3";
            
            let vL = capienzaPresets[vPreset].L;
            let vP = capienzaPresets[vPreset].P;
            let vH = capienzaPresets[vPreset].H;
            
            viaggi.push({ 
                id: parseInt(key), 
                items: tripData.items,
                vehiclePreset: vPreset,
                L: vL, P: vP, H: vH
            });
        }
        
        viaggi.sort((a, b) => a.id - b.id);
        
        renderAll();
        writeLog("Azione annullata (Ctrl+Z).", "#f59e0b");
    } else {
        writeLog("Nessuna azione da annullare.", "#94a3b8");
    }
}

function updateGlobalFlagButton() {
    let btn = document.getElementById('btnGlobalFlag');
    if(!btn) return;
    let cBrown = '#654321';
    let cGray = '#cbd5e1';
    
    if (globalBanchinaStackMode === 0) {
        btn.style.background = 'transparent';
    } else if (globalBanchinaStackMode === 1) {
        btn.style.background = `linear-gradient(to bottom, ${cGray} 50%, ${cBrown} 50%)`;
    } else if (globalBanchinaStackMode === 2) {
        btn.style.background = `linear-gradient(to bottom, ${cGray} 33.3%, ${cBrown} 33.3%, ${cBrown} 66.6%, ${cGray} 66.6%)`;
    } else if (globalBanchinaStackMode === 3) {

// ==========================================
// CORE MOTORE 3D E NESTING
// ==========================================
function getNavRules(mode) {
    if(mode === 0) return { canBeBase: true,  canBeChild: true };  
    if(mode === 1) return { canBeBase: false, canBeChild: false }; 
    if(mode === 2) return { canBeBase: true,  canBeChild: false }; 
    if(mode === 3) return { canBeBase: false, canBeChild: true };  
    return { canBeBase: true, canBeChild: true };
}

function setCam(idx, mode) { 
    if (mode === 'TOP') {
        tripCameras[idx] = {x: 0, y: 0, z: 0};
    } else if (mode === 'FRONT') {
        tripCameras[idx] = {x: 1.2, y: 0, z: 0};
    } else if (mode === 'SIDE') {
        tripCameras[idx] = {x: 1.2, y: 0, z: 1.57};
    } else {
        tripCameras[idx] = {x: 1.0, y: 0, z: 0.8}; 
    }
}

function toggleXray(idx) { 
    tripXray[idx] = !tripXray[idx]; 
    renderAll(); 
}

function rifaiNestingAuto() {
    let reali = itemsMaster.filter(i => !i.isEntity);
    if(reali.length === 0) {
        return writeLog("Nessuna cassa da calcolare.", "#f59e0b");
    }
    
    saveState();
    
    itemsMaster.forEach(i => { 
        if (!i.isEntity) {
            i.trip = -1; 
            i.manual = false; 
            i.isChild = false; 
            i.x = 9999;

            i.z = 0; 
        }
    });
    
    writeLog("Calcolo incastri...", "#3b82f6"); 
    setTimeout(() => { 
        eseguiNesting(); 
    }, 50);
}

function eseguiNesting() {
    try {
        let oldViaggi = [...viaggi];
        viaggi = []; 
        let daPiazzare = itemsMaster.filter(i => i.trip === -1 && !i.isEntity); 
        daPiazzare.sort((a,b) => (b.L * b.P) - (a.L * a.P)); 
        
        let tIdx = 0;

        let globalPreset = document.getElementById('capienzaPreset').value;

        while(daPiazzare.length > 0 && tIdx < 15) {
            // Cerca di mantenere le configurazioni veicolo per i viaggi che c'erano già
            let vPreset = globalPreset;
            if(!capienzaPresets[vPreset]) vPreset = "3"; // Fallback sicuro
            
            let vL = parseFloat(document.getElementById('bL').value) || 210;
            let vP = parseFloat(document.getElementById('bP').value) || 430;
            let vH = parseFloat(document.getElementById('bH').value) || 210;
            
            let oldTrip = oldViaggi.find(vt => vt.id === tIdx);
            if(oldTrip && oldTrip.vehiclePreset) {
                vPreset = oldTrip.vehiclePreset;
                vL = capienzaPresets[vPreset].L;
                vP = capienzaPresets[vPreset].P;
                vH = capienzaPresets[vPreset].H;
            }

            let v = { 
                id: tIdx, 
                items: [],
                vehiclePreset: vPreset,
                L: vL, P: vP, H: vH
            }; 
            
            let occupatiTerra = []; 
            let cassePiazzateAdesso = 0; 
            
            for(let itm of daPiazzare) {
                // Recupera i margini globali
                let mL = parseFloat(document.getElementById('mL').value) || 4;
                let mP = parseFloat(document.getElementById('mP').value) || 4;
                let mH = parseFloat(document.getElementById('mH').value) || 5;

                // Testiamo l'incastro includendo anche il vincolo dell'altezza (tetto del veicolo)
                let entraStandard = (itm.L + mL <= v.L && itm.P + mP <= v.P && itm.H + mH <= v.H); 
                let entraRuotata  = (itm.P + mL <= v.L && itm.L + mP <= v.P && itm.H + mH <= v.H);
                
                if (!entraStandard && !entraRuotata) { 
                    if (tIdx === 0) writeLog(`Cassa ${itm.id} troppo grande per questo vano!`, "#ef4444"); 
                    continue; 
                }

                let piazzata = false; 
                let orientamenti = [];
                
                if (entraStandard) {
                    orientamenti.push({ L: itm.L, P: itm.P }); 
                }
                if (entraRuotata && itm.L !== itm.P) {
                    orientamenti.push({ L: itm.P, P: itm.L });
                }
                
                let rulesItm = getNavRules(itm.stackMode);

                for(let ori of orientamenti) {
                    if (piazzata) break; 
                    
                    let cL = ori.L; 
                    let cP = ori.P; 
                    let w = cL + mL; 
                    let d = cP + mP;
                    
                    if(rulesItm.canBeChild) {
                        let basiStack = v.items.filter(b => getNavRules(b.stackMode).canBeBase);
                        basiStack.sort((a,b) => (b.z + b.H) - (a.z + a.H));

                        for(let base of basiStack) {
                            if(cL <= base.L && cP <= base.P && (base.z + base.H + itm.H + mH) <= v.H) {
                                let targetZ = base.z + base.H + mH;
                                let sameLevelItems = v.items.filter(c => Math.abs(c.z - targetZ) < 0.1);
                                
                                for(let sy = base.y; sy <= base.y + base.P - cP; sy += 5) {
                                    for(let sx = base.x; sx <= base.x + base.L - cL; sx += 5) {
                                        let col = sameLevelItems.some(c => 
                                            sx < c.x + c.L + mL && sx + cL + mL > c.x && 
                                            sy < c.y + c.P + mP && sy + cP + mP > c.y
                                        );
                                        
                                        if(!col) {
                                            itm.x = sx; 
                                            itm.y = sy; 
                                            itm.z = targetZ; 
                                            itm.L = cL; 
                                            itm.P = cP; 
                                            itm.trip = tIdx; 
                                            itm.isChild = true; 
                                            
                                            v.items.push(itm); 
                                            piazzata = true; 
                                            cassePiazzateAdesso++; 
                                            break;
                                        }
                                    }
                                    if(piazzata) break;
                                }
                            }
                            if(piazzata) break;
                        }
                    }

                    if(piazzata) continue;

                    for(let y = 0; y <= v.P - d; y += 5) { 
                        for(let x = 0; x <= v.L - w; x += 5) {
                            if(!occupatiTerra.some(o => x < o.x1 && x + w > o.x0 && y < o.y1 && y + d > o.y0)) {
                                itm.x = x; 
                                itm.y = y; 
                                itm.z = 0; 
                                itm.L = cL; 
                                itm.P = cP; 
                                itm.trip = tIdx; 
                                itm.isChild = false; 
                                
                                v.items.push(itm);
                                occupatiTerra.push({x0: x, y0: y, x1: x + w, y1: y + d}); 
                                piazzata = true; 
                                cassePiazzateAdesso++; 
                                break;
                            }
                        } 
                        if(piazzata) break;
                    }
                } 
            }
            if(cassePiazzateAdesso === 0) {
                break; 
            }
            viaggi.push(v); 
            daPiazzare = itemsMaster.filter(i => i.trip === -1 && !i.isEntity); 
            tIdx++;
        }
        renderAll();
    } catch(e) {
        console.error("Errore nesting:", e);
    }
}

function drawCardinalFlag(p, x, y, size, mode) {
    p.push(); 
    p.noStroke(); 
    
    let s2 = size / 2; 
    let s3 = size / 3;
    let cBrown = '#654321'; 
    let cGray = '#cbd5e1';  
    
    if (mode === 0) {
        p.noFill(); 
    } else if (mode === 1) { 
        p.fill(cGray); 
        p.rect(x, y, size, s2); 
        p.fill(cBrown); 
        p.rect(x, y + s2, size, s2); 
    } else if (mode === 2) { 
        p.fill(cGray); 
        p.rect(x, y, size, s3); 
        p.fill(cBrown); 
        p.rect(x, y + s3, size, s3); 
        p.fill(cGray); 
        p.rect(x, y + s3 * 2, size, s3); 
    } else if (mode === 3) { 
        p.fill(cBrown); 
        p.rect(x, y, size, s2); 
        p.fill(cGray); 
        p.rect(x, y + s2, size, s2); 
    } 
    
    p.stroke(100); 
    p.noFill(); 
    p.strokeWeight(1); 
    p.rect(x, y, size, size); 
    p.pop();
}

function getCardinalName(mode) {
    if(mode === 0) return "Nessun vincolo";
    if(mode === 1) return "Solo Fondo";
    if(mode === 2) return "Base Portante";
    if(mode === 3) return "Solo Top";
    return "";
}

const sketch2D = (v, banchina, domId) => (p) => {
    let sc = 0.6;
    let dragItm = null;
    let ox, oy;
    let isMov = false;
    let startX, startY;
    let canvasW, canvasH;

    p.windowResized = () => {
        let domNode = document.getElementById(domId); 
        if(!domNode) return;
        canvasW = domNode.clientWidth || 800; 
        canvasH = domNode.clientHeight || 400;
        p.resizeCanvas(canvasW, canvasH);
        let bL = v.L || 700;
        let bP = v.P || 240;
        sc = Math.min(canvasW / (bP + 300), canvasH / (bL + 40)); 
    };

    p.setup = () => {
        let domNode = document.getElementById(domId);
        canvasW = domNode.clientWidth || 800; 
        canvasH = domNode.clientHeight || 400;
        let bL = v.L || 700;
        let bP = v.P || 240;
        sc = Math.min(canvasW / (bP + 300), canvasH / (bL + 40)); 
        p.createCanvas(canvasW, canvasH); 
        p5Instances.push(p);

        // Posizionamento automatico casse in banchina (solo visivo)
        let startBanchinaY = (bP * sc + 40) / sc;
        let banchinaDaOrdinare = itemsMaster.filter(b => b.trip === -1 && !b.isEntity);
        let numColonne = Math.max(2, Math.floor(((canvasW / sc) - (bP + 40)) / 140)); 
        let stepY = 150;

        banchinaDaOrdinare.forEach((b, i) => { 
            let col = i % numColonne;
            let row = Math.floor(i / numColonne);
            b.y = startBanchinaY + (col * 140); 
            b.x = row * stepY; 
        });
    };

    p.draw = () => {
        let bL = v.L || 700;
        let bP = v.P || 240;
        p.background(255); 
        let cOffX = 20; 
        p.push(); 
        p.translate(cOffX, 20);

        // Disegno Vano di Carico
        p.fill(240, 249, 255); p.stroke(186, 230, 253); p.strokeWeight(2); 
        p.rect(0, 0, bP * sc, bL * sc); 
        
        // Area Banchina
        if (!isPrintingPDF) {
            let banchinaW = canvasW - (bP * sc) - 40;
            if(banchinaW > 0) {
                p.fill(241, 245, 249); p.stroke(203, 213, 225); p.strokeWeight(1); 
                p.rect(bP * sc + 20, 0, banchinaW, canvasH - 40); 
                p.fill(148, 163, 184); p.noStroke(); p.textSize(11); p.text("BANCHINA", bP * sc + 30, 15);
            }
        }

        // --- FILTRO ANTI-SDOPPIAMENTO ---
        let allVisible = itemsMaster.filter(i => {
            if (dragItm && dragItm.id === i.id) {
                // Disegna la cassa in movimento SOLO sul camion dove si trova il mouse
                return (p.mouseX > 0 && p.mouseX < p.width && p.mouseY > 0 && p.mouseY < p.height);
            }
            return i.trip === v.id || i.trip === -1;
        });
        allVisible.sort((a, b) => a.z - b.z);

        let hoveredItem = null;
        allVisible.forEach(i => {
            let sx = i.y * sc; let sy = i.x * sc;
            let sw = i.P * sc; let sh = i.L * sc;
            let isHover = p.mouseX - cOffX > sx && p.mouseX - cOffX < sx + sw && p.mouseY - 20 > sy && p.mouseY - 20 < sy + sh;
            if(isHover) hoveredItem = i;

            p.strokeWeight(dragItm === i ? 2 : 1); 
            p.stroke(i.manual ? "#f59e0b" : "#1e293b");
            p.fill(i.z > 0 ? "#10b981" : (i.trip === -1 ? "#e2e8f0" : "#ffffff"));
            p.rect(sx, sy, sw, sh, 2);

            // Cornici rotazione (Preservate tutte le funzioni originali)
            if(isHover && !isMov && dragItm === null && !isPrintingPDF && !i.isEntity) {
                let rx = p.mouseX - cOffX - sx; let ry = p.mouseY - 20 - sy; 
                let edgeX = Math.min(15 * sc, sw / 3); let edgeY = Math.min(15 * sc, sh / 3);
                p.noFill(); p.strokeWeight(3);
                if (rx < edgeX || rx > sw - edgeX) { p.stroke("#22c55e"); p.line(sx, sy, sx, sy + sh); p.line(sx + sw, sy, sx + sw, sy + sh); }
                else if (ry < edgeY || ry > sh - edgeY) { p.stroke("#ef4444"); p.line(sx, sy, sx + sw, sy); p.line(sx, sy + sh, sx + sw, sy + sh); }
                else { p.stroke("#3b82f6"); p.rect(sx+4, sy+4, sw-8, sh-8); }
            }
            if(!i.isEntity) drawCardinalFlag(p, sx + 2, sy + 2, 10, i.stackMode);
            p.fill(0); p.noStroke(); p.textSize(Math.max(8, 10 * sc)); p.textAlign(p.CENTER, p.CENTER); 
            p.text(`${i.id}${i.z > 0 ? '(S)' : ''}`, sx + sw / 2, sy + sh / 2);
        });
        p.pop();

        if (hoveredItem && !isMov && dragItm === null && !isPrintingPDF) {
            p.fill(30, 41, 59, 230); p.stroke(100); p.rect(p.mouseX + 10, p.mouseY + 10, 150, 40, 4); 
            p.fill(255); p.noStroke(); p.textSize(10); p.text(`ID: ${hoveredItem.id}\nDim: ${hoveredItem.L}x${hoveredItem.P}x${hoveredItem.H}`, p.mouseX + 18, p.mouseY + 16);
        }
    };

    p.mousePressed = () => {
        if(isPrintingPDF) return;
        startX = p.mouseX; startY = p.mouseY; 
        let cOffX = 20; 
        let allPossible = itemsMaster.filter(i => i.trip === v.id || i.trip === -1);
        for(let i of allPossible) {
            let mx = (p.mouseX - cOffX) / sc; let my = (p.mouseY - 20) / sc;
            if(mx > i.y && mx < i.y + i.P && my > i.x && my < i.x + i.L) {
                saveState(); 
                if(mx > i.y && mx < i.y + 14 / sc && my > i.x && my < i.x + 14 / sc && i.id !== 'UOMO') { 
                    i.stackMode = (i.stackMode + 1) % 4; return false; 
                }
                dragItm = i; ox = mx - i.y; oy = my - i.x; isMov = false; 
                dragItm.safeX = i.x; dragItm.safeY = i.y; dragItm.safeZ = i.z; 
                dragItm.safeTrip = i.trip; dragItm.safeL = i.L; dragItm.safeP = i.P; dragItm.safeH = i.H;
                return false; 
            }
        }
    };

    p.mouseDragged = () => { 
        if(dragItm){ 
            if(p.dist(startX, startY, p.mouseX, p.mouseY) > 3) isMov = true;
            dragItm.y = (p.mouseX - 20) / sc - ox; 
            dragItm.x = (p.mouseY - 20) / sc - oy; 
            dragItm.z = 0; return false; 
        } 
    };

    p.mouseReleased = () => {
        if(dragItm) {
            let bL = v.L || 700; let bP = v.P || 240; 
            let isCurrentlyInBanchina = dragItm.y > bP; 

            if(!isMov) {
                if (!dragItm.isEntity) {
                    let rx = (p.mouseX - 20) - dragItm.y * sc; 
                    let ry = (p.mouseY - 20) - dragItm.x * sc; 
                    let sw = dragItm.P * sc; let sh = dragItm.L * sc;
                    let edgeX = Math.min(15 * sc, sw / 3); let edgeY = Math.min(15 * sc, sh / 3);
                    if ((rx < edgeX || rx > sw - edgeX) && (ry < edgeY || ry > sh - edgeY)) {
                         let dx = Math.min(rx, sw - rx); let dy = Math.min(ry, sh - ry);
                         if (dx <= dy) { let t = dragItm.P; dragItm.P = dragItm.H; dragItm.H = t; }
                         else { let t = dragItm.L; dragItm.L = dragItm.H; dragItm.H = t; }
                    } else if (rx < edgeX || rx > sw - edgeX) { let t = dragItm.P; dragItm.P = dragItm.H; dragItm.H = t; }
                    else if (ry < edgeY || ry > sh - edgeY) { let t = dragItm.L; dragItm.L = dragItm.H; dragItm.H = t; }
                    else { let t = dragItm.L; dragItm.L = dragItm.P; dragItm.P = t; }
                }
                dragItm.manual = true;
            } else {
                if(isCurrentlyInBanchina) { 
                    dragItm.trip = -1; dragItm.manual = false; dragItm.x = 9999; dragItm.y = 9999;
                } else {
                    if (dragItm.H > v.H) { alert("Cassa troppo alta!"); dragItm.x = dragItm.safeX; dragItm.y = dragItm.safeY; dragItm.trip = dragItm.safeTrip; }
                    else {
                        let rDrag = getNavRules(dragItm.stackMode); 
                        let basi = v.items.filter(b => getNavRules(b.stackMode).canBeBase && b.id !== dragItm.id);
                        for(let base of basi) {
                            if (rDrag.canBeChild) {
                                let cx = dragItm.x + dragItm.L/2; let cy = dragItm.y + dragItm.P/2;
                                if(cx >= base.x && cx <= base.x + base.L && cy >= base.y && cy <= base.y + base.P) {
                                    dragItm.z = base.z + base.H + 5; dragItm.isChild = true; break;
                                }
                            }
                        }
                        dragItm.trip = v.id; dragItm.manual = true;
                    }
                }
            }
            dragItm = null; isMov = false;
            // SINCRONIZZAZIONE TOTALE
            setTimeout(() => { if(typeof rebuildTrips === 'function') rebuildTrips(); renderAll(); }, 20);
        }
    };
};

const sketch3D = (v, domId) => (p) => {
    p.setup = () => { 
        let d = document.getElementById(domId); 
        p.createCanvas(d.clientWidth, d.clientHeight, p.WEBGL); 
        p5Instances.push(p); 
    };
    
    p.windowResized = () => { 
        let d = document.getElementById(domId); 
        if(d) {
            p.resizeCanvas(d.clientWidth, d.clientHeight); 
        }
    };
    
    p.draw = () => {
        p.background(isPrintingPDF ? 255 : 248); 
        // Aggiunti i parametri a orbitControl per permettere uno zoom molto più profondo col mouse
        p.orbitControl(2, 2, 0.5); 
        
        let bL = v.L || 700; 
        let bP = v.P || 240;
        let bH = v.H || 250;
        let cam = tripCameras[v.id] || {x: 1, y: 0, z: 0.8}; 
        
        p.rotateX(cam.x); 
        p.rotateY(cam.y); 
        p.rotateZ(cam.z); 
        
        // Calcola lo zoom dinamico sul lato più lungo per far respirare il 3D
        let maxDim = Math.max(bL, bP, bH);
        p.scale(140 / maxDim);
        
        p.fill(200, 220, 240); 
        p.stroke(100); 
        p.box(bP, bL, 2);
        
        let alpha = tripXray[v.id] ? 80 : 255;
        
        v.items.forEach(i => { 
            p.push(); 
            p.translate(i.y + i.P / 2 - bP / 2, i.x + i.L / 2 - bL / 2, i.z + i.H / 2); 
            
            if (Math.abs(i.H - i.origH) > 0.1) {
                p.fill(250, 204, 21, alpha); 
            } else if (i.z > 0) {
                p.fill(16, 185, 129, alpha); 
            } else if (i.manual) {
                p.fill(59, 130, 246, alpha); 
            } else {
                p.fill(255, 255, 255, alpha);                  
            }
            
            p.stroke(0, alpha); 
            p.box(i.P, i.L, i.H); 
            p.pop(); 
        });
    };
};

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => { 
        navigator.serviceWorker.register('./sw.js')
            .catch(err => console.log('Errore Service Worker:', err)); 
    });
}

function autoSyncTripsToCCE() {
    let dbRaw = localStorage.getItem('cuckoo_egg_db');
    if (!dbRaw) return;

    let db = JSON.parse(dbRaw);
    let isChanged = false;

    // Scorriamo tutte le casse presenti in Nest
    itemsMaster.forEach(cassa => {
        // Troviamo l'ID dell'opera originale
        let operaId = (cassa.masterData && cassa.masterData.id) ? cassa.masterData.id : cassa.id;
        
        let index = db.findIndex(o => o.id === operaId);

        if (index !== -1) {
            // Definiamo le misure dell'opera originale
            let nuovoStato = (cassa.trip !== -1) ? `Viaggio #${cassa.trip + 1}` : "In Banchina";
            
            // Se lo stato in CCE è diverso da quello attuale in Nest, aggiorniamo
            if (db[index].camion !== nuovoStato) {
                db[index].camion = nuovoStato;
                isChanged = true;
            }
        }
    });

    // Se abbiamo fatto almeno una modifica, salviamo nel database master
    if (isChanged) {
        localStorage.setItem('cuckoo_egg_db', JSON.stringify(db));
    }
}

function rebuildTrips() {
    let tripMap = {};
    // Usiamo itemsMaster come unica fonte
    itemsMaster.forEach(itm => {
        if (itm.trip !== -1) {
            if(!tripMap[itm.trip]) {
                // Cerchiamo se il viaggio esisteva già per mantenere il veicolo scelto
                let oldTrip = viaggi.find(vt => vt.id === parseInt(itm.trip));
                let vPreset = oldTrip ? oldTrip.vehiclePreset : document.getElementById('capienzaPreset').value;
                tripMap[itm.trip] = {
                    id: parseInt(itm.trip),
                    items: [],
                    vehiclePreset: vPreset,
                    L: capienzaPresets[vPreset].L,
                    P: capienzaPresets[vPreset].P,
                    H: capienzaPresets[vPreset].H
                };
            }
            tripMap[itm.trip].items.push(itm);
        }
    });
    viaggi = Object.values(tripMap).sort((a, b) => a.id - b.id);
}

function autoSyncManualCrateToCCE(item) {
    let dbRaw = localStorage.getItem('cuckoo_egg_db');
    let db = dbRaw ? JSON.parse(dbRaw) : [];

    // Controlliamo se per caso esiste già (evita duplicati)
    let index = db.findIndex(o => o.id === item.id);

    if (index === -1) {
        // CREAZIONE: Se non esiste, aggiungiamo il collo al Master DB
        let nuovaEntrata = {
            id: item.id,
            autore: "LOGISTICA",
            titolo: "Collo Extra",
            // In CCN lavoriamo con misure esterne, le scriviamo nelle colonne cassa
            l_max_cassa: item.L,
            p_max_cassa: item.P,
            h_max_cassa: item.H,
            peso: item.peso || 0,
            cassa: item.id,
            camion: "In Banchina",
            _selected: false
        };
        db.push(nuovaEntrata);
        
        // Salvataggio nel Master DB
        localStorage.setItem('cuckoo_egg_db', JSON.stringify(db));
    }
}
