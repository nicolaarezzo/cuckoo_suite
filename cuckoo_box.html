<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuckoo Box</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            background: #0f172a; 
            color: white; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        #sidebar { 
            width: 360px; 
            background: #1e293b; 
            border-right: 1px solid #334155; 
            display: flex; 
            flex-shrink: 0; 
            position: relative;
            z-index: 100; 
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        #sidebar.collapsed {
            margin-left: -360px;
        }

        .sidebar-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            width: 100%;
            box-sizing: border-box;
        }

        .toggle-tab-app {
            position: absolute;
            left: 100%;
            top: 15%;
            transform: translateY(-50%);
            background: #1e293b;
            color: #94a3b8;
            padding: 20px 6px;
            cursor: pointer;
            border-radius: 0 8px 8px 0;
            z-index: 1000;
            font-weight: bold;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            border: 1px solid #334155;
            border-left: none;
            box-shadow: 4px 0 6px rgba(0,0,0,0.4);
            transition: 0.2s;
            white-space: nowrap;
        }
        
        .toggle-tab-app:hover {
            background: #3b82f6;
            color: white;
            border-color: #60a5fa;
        }
        
        #main { 
            flex-grow: 1; 
            padding: 20px; 
            overflow-y: auto; 
            background: #0f172a; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            position: relative; 
        }
        
        .card { 
            background: #1e293b; 
            border-radius: 8px; 
            padding: 12px; 
            border: 1px solid #334155; 
        }

        label { 
            font-size: 10px; 
            color: #94a3b8; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin-bottom: 5px; 
            display: block; 
        }
        
        input[type="number"], input[type="text"] { 
            width: 100%; 
            padding: 8px; 
            background: #0f172a; 
            border: 1px solid #334155; 
            color: white; 
            border-radius: 4px; 
            box-sizing: border-box; 
            margin-bottom: 5px; 
        }
        
        input[type="number"]:focus, input[type="text"]:focus { 
            outline: none; 
            border-color: #3b82f6; 
        }

        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        button { 
            cursor: pointer; 
            padding: 10px; 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
            width: 100%; 
            transition: 0.2s; 
            margin-top: 5px; 
        }

        .btn-primary { background: #3b82f6; color: white; }
        .btn-success { background: #10b981; color: white; border: 2px solid #059669; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-dxf { background: #475569; color: white; border: 1px solid #334155; }
        .btn-ai { background: #8b5cf6; color: white; border: 1px solid #7c3aed; }
        
        .btn-primary:hover { background: #2563eb; }
        .btn-success:hover { background: #059669; }
        .btn-dxf:hover { background: #334155; }

        .checkbox-container {
            display: flex; 
            align-items: center; 
            gap: 8px; 
            margin-top: 10px; 
            margin-bottom: 10px;
            background: #020617; 
            padding: 10px; 
            border-radius: 4px; 
            border: 1px solid #10b981;
        }

        .checkbox-container input { width: 18px; height: 18px; cursor: pointer; }
        .checkbox-container label { margin: 0; color: #10b981; font-size: 12px; cursor: pointer; }

        /* BOX CARD STYLES */
        .box-card { 
            background: #ffffff; 
            border-radius: 12px; 
            color: #1e293b; 
            overflow: hidden; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); 
            display: flex; 
            flex-direction: column; 
            margin-bottom: 20px;
        }

        .box-header { 
            padding: 10px 20px; 
            background: #f1f5f9; 
            border-bottom: 1px solid #e2e8f0; 
            font-weight: bold; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .box-body { 
            display: flex; 
            width: 100%; 
            height: 500px; 
        } 
        
        .canvas-wrapper { 
            flex: 1.2; 
            position: relative; 
            background: #1e293b; 
            border-right: 1px solid #e2e8f0; 
            overflow: hidden; 
            min-width: 300px; 
        }

        .canvas-3d-target { 
            width: 100%; 
            height: 100%; 
        }
        
        .box-details { 
            flex: 0.8; 
            padding: 15px; 
            background: #f8fafc; 
            overflow-y: auto; 
            font-size: 12px;
        }
        
        .spec-table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-bottom: 15px; 
        }

        .spec-table th, .spec-table td { 
            border: 1px solid #cbd5e1; 
            padding: 6px 8px; 
            text-align: left; 
        }

        .spec-table th { background-color: #e2e8f0; }

        .part-card-mini { 
            background: #ffffff; 
            border-left: 3px solid; 
            padding: 6px; 
            margin-bottom: 4px; 
            border-radius: 0 4px 4px 0; 
            border-top: 1px solid #e2e8f0; 
            border-right: 1px solid #e2e8f0; 
            border-bottom: 1px solid #e2e8f0;
        }

        .part-imb { border-left-color: #3b82f6; }
        .part-legno { border-left-color: #f59e0b; }
        .part-rinf { border-left-color: #10b981; }

        #log { 
            font-size: 11px; 
            color: #3b82f6; 
            font-family: monospace; 
            background: #000; 
            padding: 10px; 
            border-radius: 4px; 
            height: 50px; 
            overflow-y: auto; 
            flex-shrink: 0; 
            margin-top: 10px;
        }

        .controls-3d { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            z-index: 10; 
            background: rgba(15, 23, 42, 0.85); 
            padding: 10px; 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            border: 1px solid #334155; 
            backdrop-filter: blur(4px); 
        }

        .controls-3d label { 
            color: #cbd5e1; 
            font-size: 11px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            margin: 0; 
            font-weight: normal; 
        }

        .controls-3d input[type="checkbox"] { 
            width: 14px; 
            height: 14px; 
            margin: 0; 
            cursor: pointer; 
        }
        
        .controls-divider {
            border-top: 1px solid #475569;
            margin: 4px 0;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="toggle-tab-app" onclick="toggleSidebar()">MENU CCB</div>
    <div class="sidebar-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h2 style="margin:0; color: #3b82f6; font-size: 1.4em;">Cuckoo Box</h2>
        </div>

        <div class="card" style="border-left: 4px solid #10b981; background: #064e3b; text-align: center; padding: 20px;">
            <span style="font-size:30px;">📡</span><br>
            <b style="color: #6ee7b7;">In attesa di Opere da CCE...</b><br>
            <span style="font-size:10px; color:#a7f3d0;">Seleziona le opere in CCE e premi "A Produzione". Appariranno qui in automatico.</span>
        </div>

        <div class="card" style="border-left: 4px solid #3b82f6;">
            <label style="color: #60a5fa;">Aggiungi Cassa Manuale (CM)</label>
            <div class="grid-3">
                <div>
                    <input type="number" id="manL" value="100">
                    <div style="font-size: 9px; color: #64748b; text-align: center;">L</div>
                </div>
                <div>
                    <input type="number" id="manP" value="80">
                    <div style="font-size: 9px; color: #64748b; text-align: center;">P</div>
                </div>
                <div>
                    <input type="number" id="manH" value="60">
                    <div style="font-size: 9px; color: #64748b; text-align: center;">H</div>
                </div>
            </div>
            <div class="grid-2" style="margin-top: 5px;">
                <input type="number" id="manPeso" placeholder="Peso (KG)">
                <button class="btn-primary" style="margin-top: 0; padding: 8px;" onclick="aggiungiCassaManuale()">➕ AGGIUNGI</button>
            </div>
        </div>

        <div class="card">
            <label>Impostazioni Pannelli (MM)</label>
            <div class="grid-2">
                <div>
                    <label style="margin-bottom: 2px;">Imbottitura</label>
                    <input type="number" step="1" id="globalImb" value="20" onchange="ricalcolaTutto()">
                </div>
                <div>
                    <label style="margin-bottom: 2px;">Legno</label>
                    <input type="number" step="1" id="globalLegno" value="18" onchange="ricalcolaTutto()">
                </div>
            </div>
            <div class="checkbox-container">
                <input type="checkbox" id="abilitaRinforzi" onchange="toggleRinforziGlobal()" checked>
                <label for="abilitaRinforzi">🔨 AGGIUNGI RINFORZI</label>
            </div>
            <div id="rinforziInputs" style="margin-top: 5px;">
                <div class="grid-2">
                    <div>
                        <label>Larghezza</label>
                        <input type="number" step="1" id="larghezzaRinforzi" value="100" onchange="ricalcolaTutto()">
                    </div>
                    <div>
                        <label>Spessore</label>
                        <input type="number" step="1" id="spessoreRinforzi" value="18" onchange="ricalcolaTutto()">
                    </div>
                </div>
            </div>
        </div>

        <div id="log">> Modulo Produzione attivo.</div>

        <div style="margin-top: 5px; display: flex; flex-direction: column; gap: 5px;">
            <button class="btn-danger" style="background:#ef4444;" onclick="exportToCuckooNest()">🚀 INVIA AL CAMION (CCN)</button>
            <button class="btn-dxf" onclick="generaDXF('imbottitura')">📥 DXF Imbottitura</button>
            <button class="btn-dxf" onclick="generaDXF('legno')">📥 DXF Legno</button>
            <button id="btnRinforzi" class="btn-dxf" onclick="generaDXF('rinforzi')">📥 DXF Rinforzi</button>
        </div>
    </div>
</div>

<div id="main">
    <div id="boxes-container" style="display: flex; flex-direction: column; gap: 20px;"></div>
</div>

<script>
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('collapsed');
}

let itemsMaster = []; 
let p5Instances = {}; 
let boxObserver = null; 
let cassaIdCounter = 1;

window.onload = () => { 
    // Recupera le casse salvate in precedenza
    let saved = localStorage.getItem('cuckoo_box_persistence_db');
    if (saved) {
        try {
            itemsMaster = JSON.parse(saved);
        } catch(e) { console.error("Errore ripristino memoria CCB"); }
    }
    
    checkCCBImportQueue(); 
    renderBoxes(); 
};

// ==========================================
// RICEZIONE DATI DA CCE (Ponte A)
// ==========================================
window.addEventListener('storage', function(e) {
    if (e.key === 'cuckoo_box_import_queue') {
        checkCCBImportQueue();
    }
});

function checkCCBImportQueue() {
    let raw = localStorage.getItem('cuckoo_box_import_queue');
    if(raw) {
        try {
            let queue = JSON.parse(raw);
            if(queue.length > 0) {
                queue.forEach(item => {
                    let itm = {
                        id: `Cassa-${String(Math.floor(Math.random()*1000)).padStart(3,'0')}`,
                        L: item.L || 100, 
                        P: item.P || 100, 
                        H: item.H || 100,
                        pesoNetto: item.pesoNetto || 0,
                        masterData: item.masterData || item 
                    };
                    
                    if(item.titolo) {
                        itm.id = `[${item.titolo.substring(0,10)}] ${itm.id}`;
                    }
                    
                    calcolaBox(itm); 
                    itemsMaster.push(itm);
                });
                
                // Svuota la coda dopo aver letto
                localStorage.setItem('cuckoo_box_import_queue', '[]');
                writeLog(`Ricevute ${queue.length} opere da CCE!`);
                renderBoxes();
                saveCCBState();
                
                // AGGIUNTO QUI: Invia a Cuckoo View in silenzio dopo aver importato
                sendToCuckooView(true); 
            }
        } catch(e) { 
            console.error("Errore lettura coda:", e); 
        }
    }
}



// ==========================================
// SPEDIZIONE AL CAMION CCN (Ponte D)
// ==========================================
function exportToCuckooNest() {
    if (itemsMaster.length === 0) return alert('Nessuna cassa da inviare.'); 
    
    let cassePerNest = itemsMaster.map(cassa => {
        const dim = cassa.results.dimensioniFinali;
        let pesoPiena = dim.pesoLegno + (cassa.pesoNetto || 0);

        return {
            id: cassa.id,
            autoId: String(Math.floor(Math.random() * 1000)).padStart(3, '0'), 
            L: parseFloat((dim.lExt / 10).toFixed(1)),
            P: parseFloat((dim.pExt / 10).toFixed(1)),
            H: parseFloat((dim.hExt / 10).toFixed(1)),
            peso: parseFloat(pesoPiena.toFixed(2)),
            origL: parseFloat((dim.lExt / 10).toFixed(1)),
            origP: parseFloat((dim.pExt / 10).toFixed(1)),
            origH: parseFloat((dim.hExt / 10).toFixed(1)),
            x: 9999, 
            y: 20, 
            z: 0, 
            trip: -1, 
            manual: false, 
            stackMode: 0, 
            isChild: false, 
            isEntity: false,
            masterData: cassa.masterData // Passa avanti il testimone dei dati logistici completi!
        };
    });

    let queue = JSON.parse(localStorage.getItem('cuckoo_nest_transfer_queue') || '[]');
    localStorage.setItem('cuckoo_nest_transfer_queue', JSON.stringify(queue.concat(cassePerNest)));
    
    alert(`✅ ${cassePerNest.length} casse inviate a CCN!\nLe trovi nella banchina in attesa di essere caricate sul camion.`);
}

// ==========================================
// LOGICA INTERFACCIA E CALCOLI MATEMATICI
// ==========================================

function writeLog(m) { 
    let l = document.getElementById('log'); 
    l.innerHTML = `<div>> ${m}</div>` + l.innerHTML; 
}

// Salva lo stato attuale di CCB per non perdere il lavoro al refresh
function saveCCBState() {
    localStorage.setItem('cuckoo_box_persistence_db', JSON.stringify(itemsMaster));
}

function toggleRinforziGlobal() {
    const abilitato = document.getElementById('abilitaRinforzi').checked;
    document.getElementById('rinforziInputs').style.display = abilitato ? 'block' : 'none';
    
    itemsMaster.forEach((_, idx) => { 
        let cb = document.getElementById(`show-rin-${idx}`); 
        if(cb) { 
            cb.checked = abilitato; 
            cb.disabled = !abilitato; 
        } 
    });
    
    ricalcolaTutto();
}

function getGlobalSettings() { 
    return { 
        i: parseFloat(document.getElementById('globalImb').value) || 20, 
        legno: parseFloat(document.getElementById('globalLegno').value) || 18, 
        useRinf: document.getElementById('abilitaRinforzi').checked, 
        rW: parseFloat(document.getElementById('larghezzaRinforzi').value) || 100, 
        rSpess: parseFloat(document.getElementById('spessoreRinforzi').value) || 18 
    }; 
}

function calcolaBox(item) {
    const set = getGlobalSettings(); 
    const l = item.L; 
    const p = item.P; 
    const h = item.H; 
    const i = set.i; 
    const legno = set.legno;
    
    const lTot = l + 2*i + 2*legno; 
    const pTot = p + 2*i + 2*legno; 
    const hTot = h + 2*i + 2*legno;

    const imb = { 
        base: { l: l + 2*i, p: p + 2*i, nome: 'Base' }, 
        coperchio: { l: l + 2*i, p: p + 2*i, nome: 'Cop.' }, 
        fiancoSx: { l: p, h: h, nome: 'FSx' }, 
        fiancoDx: { l: p, h: h, nome: 'FDx' }, 
        fronte: { l: l + 2*i, h: h, nome: 'Fro' }, 
        retro: { l: l + 2*i, h: h, nome: 'Ret' } 
    };
    
    const pan = { 
        base: { l: lTot, p: pTot, nome: 'Base' }, 
        coperchio: { l: lTot, p: pTot, nome: 'Cop.' }, 
        fiancoSx: { l: pTot - 2*legno, h: hTot - 2*legno, nome: 'FSx' }, 
        fiancoDx: { l: pTot - 2*legno, h: hTot - 2*legno, nome: 'FDx' }, 
        fronte: { l: lTot, h: hTot - 2*legno, nome: 'Fro' }, 
        retro: { l: lTot, h: hTot - 2*legno, nome: 'Ret' } 
    };

    let rinf = null; 
    let lExt = lTot; 
    let pExt = pTot; 
    let hExt = hTot;
    
    if (set.useRinf) {
        const rW = set.rW; 
        const rSpess = set.rSpess; 
        lExt += 2 * rSpess; 
        pExt += 2 * rSpess; 
        hExt += 2 * rSpess; 
        
        rinf = { 
            baseLunga1: { l: lTot + 2*rSpess, h: rW, nome: 'Base Lunga 1' }, 
            baseLunga2: { l: lTot + 2*rSpess, h: rW, nome: 'Base Lunga 2' }, 
            baseCorta1: { l: pTot + 2*rSpess - 2*rW, h: rW, nome: 'Base Corta 1' }, 
            baseCorta2: { l: pTot + 2*rSpess - 2*rW, h: rW, nome: 'Base Corta 2' },
            copLunga1: { l: lTot + 2*rSpess, h: rW, nome: 'Cop. Lunga 1' }, 
            copLunga2: { l: lTot + 2*rSpess, h: rW, nome: 'Cop. Lunga 2' }, 
            copCorta1: { l: pTot + 2*rSpess - 2*rW, h: rW, nome: 'Cop. Corta 1' }, 
            copCorta2: { l: pTot + 2*rSpess - 2*rW, h: rW, nome: 'Cop. Corta 2' },
            fiancoSxL1: { l: pTot, h: rW, nome: 'Sx Lunga 1' },
            fiancoSxL2: { l: pTot, h: rW, nome: 'Sx Lunga 2' },
            fiancoSxC1: { l: hTot - 2*rW, h: rW, nome: 'Sx Corta 1' },
            fiancoSxC2: { l: hTot - 2*rW, h: rW, nome: 'Sx Corta 2' },
            fiancoDxL1: { l: pTot, h: rW, nome: 'Dx Lunga 1' },
            fiancoDxL2: { l: pTot, h: rW, nome: 'Dx Lunga 2' },
            fiancoDxC1: { l: hTot - 2*rW, h: rW, nome: 'Dx Corta 1' },
            fiancoDxC2: { l: hTot - 2*rW, h: rW, nome: 'Dx Corta 2' },
            fronteL1: { l: lTot + 2*rSpess, h: rW, nome: 'Fronte Lunga 1' },
            fronteL2: { l: lTot + 2*rSpess, h: rW, nome: 'Fronte Lunga 2' },
            fronteC1: { l: hTot - 2*rW, h: rW, nome: 'Fronte Corta 1' },
            fronteC2: { l: hTot - 2*rW, h: rW, nome: 'Fronte Corta 2' },
            retroL1: { l: lTot + 2*rSpess, h: rW, nome: 'Retro Lunga 1' },
            retroL2: { l: lTot + 2*rSpess, h: rW, nome: 'Retro Lunga 2' },
            retroC1: { l: hTot - 2*rW, h: rW, nome: 'Retro Corta 1' },
            retroC2: { l: hTot - 2*rW, h: rW, nome: 'Retro Corta 2' }
        };
    }

    let volLegno = 0; 
    Object.values(pan).forEach(v => {
        volLegno += (v.l||v.w)/1000 * (v.p||v.h)/1000 * (legno/1000);
    });
    
    if(rinf) {
        Object.values(rinf).forEach(v => {
            volLegno += (v.l||v.w)/1000 * (v.p||v.h)/1000 * (set.rSpess/1000);
        });
    }
    
    let pesoLegno = volLegno * 420;
    
    item.results = { 
        dimensioniFinali: { lTot, pTot, hTot, lExt, pExt, hExt, pesoLegno: pesoLegno }, 
        imb, 
        pan, 
        rinf 
    };

    // --- AGGIUNTO: SINCRONIZZAZIONE AUTOMATICA ---
    autoSyncItemToCCE(item);
}

function autoSyncItemToCCE(item) {
    let dbRaw = localStorage.getItem('cuckoo_egg_db');
    let db = dbRaw ? JSON.parse(dbRaw) : [];

    // Cerchiamo di capire se questa cassa è figlia di un'opera di CCE
    let operaId = (item.masterData && item.masterData.id) ? item.masterData.id : null;
    let index = -1;

    if (operaId) {
        // Caso A: L'opera esiste già (arriva da CCE)
        index = db.findIndex(o => o.id === operaId);
    } else {
        // Caso B: È una cassa manuale, controlliamo se l'abbiamo già aggiunta al DB
        index = db.findIndex(o => o.id === item.id);
    }

    const dimF = item.results.dimensioniFinali;

    if (index !== -1) {
        // AGGIORNAMENTO riga esistente
        db[index].cassa = item.id;
        db[index].tara = parseFloat(dimF.pesoLegno.toFixed(2));
        db[index].l_max_cassa = parseFloat((dimF.lExt/10).toFixed(1));
        db[index].p_max_cassa = parseFloat((dimF.pExt/10).toFixed(1));
        db[index].h_max_cassa = parseFloat((dimF.hExt/10).toFixed(1));
    } else {
        // CREAZIONE nuova riga (Cassa Manuale)
        let nuovaEntrata = {
            id: item.id,
            autore: "PRODUZIONE",
            titolo: "Cassa Manuale",
            l_max: parseFloat((item.L / 10).toFixed(1)),
            p_max: parseFloat((item.P / 10).toFixed(1)),
            h_max: parseFloat((item.H / 10).toFixed(1)),
            peso: item.pesoNetto || 0,
            cassa: item.id,
            tara: parseFloat(dimF.pesoLegno.toFixed(2)),
            l_max_cassa: parseFloat((dimF.lExt/10).toFixed(1)),
            p_max_cassa: parseFloat((dimF.pExt/10).toFixed(1)),
            h_max_cassa: parseFloat((dimF.hExt/10).toFixed(1)),
            _selected: false
        };
        db.push(nuovaEntrata);
    }

    // Salvataggio Master
    localStorage.setItem('cuckoo_egg_db', JSON.stringify(db));
}

function ricalcolaTutto() { 
    itemsMaster.forEach(item => calcolaBox(item)); 
    renderBoxes();
    saveCCBState();
    sendToCuckooView(true);
}

function aggiungiCassaManuale() {
    let l_cm = parseFloat(document.getElementById('manL').value) || 100; 
    let p_cm = parseFloat(document.getElementById('manP').value) || 80; 
    let h_cm = parseFloat(document.getElementById('manH').value) || 60;
    let pesoStr = document.getElementById('manPeso').value.trim(); 
    let pesoVal = pesoStr !== "" && !isNaN(parseFloat(pesoStr)) ? parseFloat(pesoStr) : 0;
    
    let newItem = { 
        id: `Cassa-Manuale-${cassaIdCounter++}`, 
        L: l_cm * 10, 
        P: p_cm * 10, 
        H: h_cm * 10, 
        pesoNetto: pesoVal 
    };
    
    calcolaBox(newItem); 
    itemsMaster.push(newItem); 
    writeLog(`Cassa manuale creata.`); 
    renderBoxes();
    sendToCuckooView(true);
    if(typeof saveCCBState === "function") saveCCBState();
}

function rimuoviCassa(index) { 
    itemsMaster.splice(index, 1); 
    renderBoxes();
    saveCCBState();
    sendToCuckooView(true); 
}

function renderBoxes() {
    const container = document.getElementById('boxes-container');
    if(boxObserver) boxObserver.disconnect();
    
    Object.values(p5Instances).forEach(p => { 
        if(p && typeof p.remove === 'function') p.remove(); 
    }); 
    p5Instances = {}; 
    container.innerHTML = "";

    if(itemsMaster.length === 0) { 
        container.innerHTML = `<div style="text-align: center; color: #64748b; margin-top: 50px;"><h2>Vano Produzione Vuoto</h2><p>Le casse inviate da CCE compariranno qui.</p></div>`; 
        return; 
    }

    itemsMaster.forEach((item, index) => {
        const card = document.createElement('div'); 
        card.className = 'box-card';
        const dimF = item.results.dimensioniFinali;
        let rinfChecked = item.results.rinf ? 'checked' : 'disabled';
        
        let infoExtra = "";
        if(item.masterData && item.masterData.titolo) {
            infoExtra = `Contiene: <b>${item.masterData.titolo}</b>`;
        }

        card.innerHTML = `
            <div class="box-header">
                <div>
                    <span style="font-size: 16px; color: #3b82f6;">📦 ${item.id}</span> 
                    <span style="font-weight:normal; font-size:11px; margin-left:10px; color:#64748b;">${infoExtra}</span>
                </div>
                <button onclick="rimuoviCassa(${index})" style="background: none; border: none; color: #ef4444; cursor: pointer; font-size: 14px; font-weight: bold;">✖</button>
            </div>
            <div class="box-body">
                <div class="canvas-wrapper">
                    <div class="controls-3d">
                        <label><input type="checkbox" id="show-eta-${index}" checked> 🧊 Etafoam</label>
                        <label><input type="checkbox" id="show-cas-${index}" checked> 🪵 Cassa</label>
                        <label><input type="checkbox" id="show-rin-${index}" ${rinfChecked}> 🔨 Rinforzi</label>
                        <div class="controls-divider"></div>
                        <label style="color:#3b82f6;"><input type="checkbox" id="xray-${index}"> 🩻 Raggi X</label>
                    </div>
                    <div class="canvas-3d-target" data-idx="${index}" id="c3d-${index}"></div>
                </div>
                <div class="box-details">
                    <table class="spec-table">
                        <tr><th>Vano Intero (cm)</th><td>${(item.L/10).toFixed(1)} x ${(item.P/10).toFixed(1)} x ${(item.H/10).toFixed(1)}</td></tr>
                        <tr><th>Ingombro Esterno (cm)</th><td>${(dimF.lExt/10).toFixed(1)} x ${(dimF.pExt/10).toFixed(1)} x ${(dimF.hExt/10).toFixed(1)}</td></tr>
                    </table>
                    <div style="display:flex; gap:10px; margin-bottom:15px;">
                        <div style="background:#e2e8f0; padding:8px; border-radius:4px; flex:1; text-align:center;">
                            <div style="font-size:10px;">TARA (Legno)</div>
                            <div style="color:#f59e0b; font-size: 16px;"><b>${dimF.pesoLegno.toFixed(1)} KG</b></div>
                        </div>
                        <div style="background:#e2e8f0; padding:8px; border-radius:4px; flex:1; text-align:center;">
                            <div style="font-size:10px;">PESO NETTO</div>
                            <div style="color:#3b82f6; font-size: 16px;"><b>${item.pesoNetto||0} KG</b></div>
                        </div>
                    </div>
                    <div style="display:flex; gap: 15px;">
                        <div style="flex:1;">
                            <h4 style="color:#3b82f6; margin-bottom:5px; margin-top:0;">🧊 Imbottitura (mm)</h4>
                            ${generaHtmlPezzi(item.results.imb, 'imb')}
                        </div>
                        <div style="flex:1;">
                            <h4 style="color:#f59e0b; margin-bottom:5px; margin-top:0;">🪵 Legno (mm)</h4>
                            ${generaHtmlPezzi(item.results.pan, 'legno')}
                            ${item.results.rinf ? `<h4 style="color:#10b981; margin-bottom:5px; margin-top:10px;">🔨 Rinforzi (mm)</h4>${generaHtmlPezzi(item.results.rinf, 'rinf')}` : ''}
                        </div>
                    </div>
                </div>
            </div>
        `;
        container.appendChild(card);
    });

    boxObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            let idx = entry.target.dataset.idx;
            if (entry.isIntersecting) { 
                if (!p5Instances[idx]) {
                    p5Instances[idx] = new p5(sketch3DBox(itemsMaster[idx], idx), entry.target); 
                }
            }
        });
    }, { rootMargin: '300px' }); 
    
    document.querySelectorAll('.canvas-3d-target').forEach(el => boxObserver.observe(el));
}

function generaHtmlPezzi(objDict, tipo) {
    if(!objDict) return ""; 
    let html = "";
    Object.values(objDict).forEach(v => {
        html += `
        <div class="part-card-mini part-${tipo}">
            <div style="font-size:9px; color:#64748b;">${v.nome}</div>
            <div style="font-weight:bold; color:#1e293b;">${(v.l||v.w).toFixed(0)} × ${(v.p||v.h).toFixed(0)} mm</div>
        </div>`;
    });
    return html;
}

// ==========================================
// RENDERIZZATORE 3D CON SUPPORTO RINFORZI E RAGGI X
// ==========================================
const sketch3DBox = (item, index) => (p) => {
    p.setup = () => { 
        let d = p.canvas.parentElement; 
        p.createCanvas(d.clientWidth || 400, d.clientHeight || 500, p.WEBGL); 
    };
    
    p.windowResized = () => { 
        let d = p.canvas.parentElement; 
        if(d && d.clientWidth > 0) p.resizeCanvas(d.clientWidth, d.clientHeight); 
    };

    p.draw = () => {
        p.background('#1e293b'); 
        p.orbitControl();
        
        const dimF = item.results.dimensioniFinali; 
        const set = getGlobalSettings();
        
        let l = item.L; 
        let d = item.P; 
        let h = item.H; 
        let lT = dimF.lTot; 
        let pT = dimF.pTot; 
        let hT = dimF.hTot;
        
        let i = set.i; 
        let legno = set.legno; 
        let rW = set.rW;
        let rSpess = set.rSpess;
        let maxDim = Math.max(dimF.lExt, dimF.pExt, dimF.hExt); 
        let S = 180 / maxDim;
        
        let cbEta = document.getElementById(`show-eta-${index}`); 
        let showEta = cbEta ? cbEta.checked : true;
        
        let cbCas = document.getElementById(`show-cas-${index}`); 
        let showCas = cbCas ? cbCas.checked : true;

        let cbRin = document.getElementById(`show-rin-${index}`);
        let showRin = cbRin ? cbRin.checked : false;

        let cbXray = document.getElementById(`xray-${index}`); 
        let xRay = cbXray ? cbXray.checked : false;

        p.perspective(); // Forza sempre la prospettiva naturale
        p.rotateX(0.8); 
        p.rotateZ(0.5); 
        p.strokeWeight(0.5); 
        
        const drawP = (x, y, z, w, depth, height) => { 
            p.push(); 
            p.translate(x * S, y * S, z * S); 
            p.box(w * S, depth * S, height * S); 
            p.pop(); 
        };

        if (showEta) { 
            let alpha = xRay ? 60 : 255;
            p.fill(240, 240, 240, alpha); 
            p.stroke(0, 0, 0, alpha === 255 ? 200 : 80); 
            drawP(0, 0, -h/2 - i/2, l + 2*i, d + 2*i, i); 
            drawP(0, 0, h/2 + i/2, l + 2*i, d + 2*i, i); 
            drawP(0, d/2 + i/2, 0, l + 2*i, i, h); 
            drawP(0, -d/2 - i/2, 0, l + 2*i, i, h); 
            drawP(-l/2 - i/2, 0, 0, i, d, h); 
            drawP(l/2 + i/2, 0, 0, i, d, h); 
        }
        
        if (showCas) { 
            let alpha = xRay ? 60 : 255;
            p.fill(90, 50, 30, alpha); 
            p.stroke(50, 25, 15, alpha === 255 ? 255 : 100); 
            drawP(0, 0, -h/2 - i - legno/2, lT, pT, legno); 
            drawP(0, 0, h/2 + i + legno/2, lT, pT, legno); 
            drawP(0, d/2 + i + legno/2, 0, lT, legno, hT - 2*legno); 
            drawP(0, -d/2 - i - legno/2, 0, lT, legno, hT - 2*legno); 
            drawP(-l/2 - i - legno/2, 0, 0, legno, pT - 2*legno, hT - 2*legno); 
            drawP(l/2 + i + legno/2, 0, 0, legno, pT - 2*legno, hT - 2*legno); 
        }

        if (showRin && item.results.rinf) {
            let alpha = xRay ? 120 : 255;
            p.fill(220, 170, 110, alpha); 
            p.stroke(120, 80, 40, alpha === 255 ? 255 : 150);
            for(let zOff of [-hT/2 - rSpess/2, hT/2 + rSpess/2]) { 
                drawP(0, pT/2 + rSpess - rW/2, zOff, lT + 2*rSpess, rW, rSpess); 
                drawP(0, -pT/2 - rSpess + rW/2, zOff, lT + 2*rSpess, rW, rSpess); 
                drawP(lT/2 + rSpess - rW/2, 0, zOff, rW, pT + 2*rSpess - 2*rW, rSpess); 
                drawP(-lT/2 - rSpess + rW/2, 0, zOff, rW, pT + 2*rSpess - 2*rW, rSpess); 
            }
            for(let yOff of [pT/2 + rSpess/2, -pT/2 - rSpess/2]) { 
                drawP(0, yOff, hT/2 - rW/2, lT + 2*rSpess, rSpess, rW); 
                drawP(0, yOff, -hT/2 + rW/2, lT + 2*rSpess, rSpess, rW); 
                drawP(lT/2 + rSpess - rW/2, yOff, 0, rW, rSpess, hT - 2*rW); 
                drawP(-lT/2 - rSpess + rW/2, yOff, 0, rW, rSpess, hT - 2*rW); 
            }
            for(let xOff of [lT/2 + rSpess/2, -lT/2 - rSpess/2]) { 
                drawP(xOff, 0, hT/2 - rW/2, rSpess, pT, rW); 
                drawP(xOff, 0, -hT/2 + rW/2, rSpess, pT, rW); 
                drawP(xOff, pT/2 - rW/2, 0, rSpess, rW, hT - 2*rW); 
                drawP(xOff, -pT/2 + rW/2, 0, rSpess, rW, hT - 2*rW); 
            }
        }
    };
};

function sendToCuckooView(silent = false) {
    // RIMOSSO il blocco "if (itemsMaster.length === 0) return;" 
    // perché vogliamo inviare anche una lista vuota!

    let currentSettings = getGlobalSettings();
    let casseExport = itemsMaster.map(c => { 
        return { 
            id: c.id, 
            L: c.L, P: c.P, H: c.H, pesoNetto: c.pesoNetto, 
            results: { 
                set: currentSettings, 
                dimF: c.results.dimensioniFinali,
                imb: c.results.imb,
                pan: c.results.pan,
                rinf: c.results.rinf
            },
            masterData: c.masterData 
        }; 
    });
    
    let ccvDataRaw = localStorage.getItem('cuckoo_view_transfer_data'); 
    let ccvData = ccvDataRaw ? JSON.parse(ccvDataRaw) : {};
    
    if(!ccvData.ccb) ccvData.ccb = {};
    ccvData.ccb.type = "CuckooBox";
    ccvData.ccb.crates = casseExport; // Sarà [] se non ci sono casse
    ccvData.ccb.settings = currentSettings;
    
    localStorage.setItem('cuckoo_view_transfer_data', JSON.stringify(ccvData));
    
    if(!silent && itemsMaster.length > 0) alert(`✅ Dati aggiornati in View!`);
}

// ==========================================
// FUNZIONI DI NESTING E GENERAZIONE DXF
// ==========================================

function getAggregatedParts(tipo) { 
    let allParts = []; 
    itemsMaster.forEach(item => { 
        let parts = {}; 
        
        if (tipo === 'imbottitura') parts = item.results.imb; 
        else if (tipo === 'legno') parts = item.results.pan; 
        else if (tipo === 'rinforzi' && item.results.rinf) parts = item.results.rinf;
        
        if(parts) { 
            Object.values(parts).forEach(p => { 
                let pCopy = {...p}; 
                pCopy.nome = `[${item.id}] ${pCopy.nome}`; 
                allParts.push(pCopy); 
            }); 
        } 
    }); 
    return allParts; 
}

function splitPiece(piece, maxW, maxH, spacing = 18) {
    const pieces = []; 
    const w = piece.w || piece.l; 
    const h = piece.h || piece.p;
    
    if (w + spacing * 2 <= maxW && h + spacing * 2 <= maxH) {
        return [{ ...piece, w, h }];
    }
    if (h + spacing * 2 <= maxW && w + spacing * 2 <= maxH) {
        return [{ ...piece, w: h, h: w, rotated: true }];
    }
    
    const numW = Math.ceil(w / (maxW - spacing * 2)); 
    const numH = Math.ceil(h / (maxH - spacing * 2));
    let count = 0; 
    
    const pieceW = Math.floor(w / numW); 
    const pieceH = Math.floor(h / numH);
    
    for (let i = 0; i < numW; i++) { 
        for (let j = 0; j < numH; j++) { 
            count++; 
            pieces.push({ 
                ...piece, 
                nome: `${piece.nome} (${count}/${numW*numH})`, 
                w: pieceW, 
                h: pieceH 
            }); 
        } 
    }
    return pieces;
}

function nesting(pannelli, pianoW, pianoH) {
    const spacing = 18; 
    let allPieces = [];
    
    pannelli.forEach(p => { 
        allPieces = allPieces.concat(splitPiece(p, pianoW, pianoH, spacing)); 
    });
    
    const sorted = allPieces.sort((a, b) => (b.w * b.h) - (a.w * a.h));
    
    const allPanels = []; 
    let currentPanel = [];
    let currentX = spacing; 
    let currentY = spacing; 
    let rowHeight = 0; 
    let panelIndex = 0;
    
    for (const pezzo of sorted) {
        let useW = pezzo.w; 
        let useH = pezzo.h; 
        let rotated = pezzo.rotated || false;
        
        if (useW + spacing * 2 > pianoW && useH + spacing * 2 <= pianoW) { 
            let temp = useW; 
            useW = useH; 
            useH = temp; 
            rotated = true; 
        }
        
        let placed = false;
        while (!placed) {
            if (currentX + useW + spacing <= pianoW && currentY + useH + spacing <= pianoH) {
                currentPanel.push({ ...pezzo, x: currentX, y: currentY, w: useW, h: useH, rotated, panelIndex });
                currentX += useW + spacing; 
                rowHeight = Math.max(rowHeight, useH); 
                placed = true;
            } else {
                currentY += rowHeight + spacing; 
                currentX = spacing; 
                rowHeight = 0;
                
                if (currentY + useH + spacing <= pianoH && currentX + useW + spacing <= pianoW) {
                    currentPanel.push({ ...pezzo, x: currentX, y: currentY, w: useW, h: useH, rotated, panelIndex });
                    currentX += useW + spacing; 
                    rowHeight = useH; 
                    placed = true;
                } else {
                    if (currentPanel.length > 0) { 
                        allPanels.push([...currentPanel]); 
                        panelIndex++; 
                    }
                    currentPanel = []; 
                    currentX = spacing; 
                    currentY = spacing; 
                    rowHeight = 0;
                }
            }
        }
    }
    
    if (currentPanel.length > 0) {
        allPanels.push(currentPanel); 
    }
    
    return allPanels;
}

function generaDXF(tipo) {
    if (itemsMaster.length === 0) { 
        alert('Nessuna cassa presente per generare il DXF.'); 
        return; 
    }
    
    const pannelli = getAggregatedParts(tipo);
    if (pannelli.length === 0) {
        alert('Nessun pezzo disponibile per questo tipo di esportazione.');
        return;
    }

    const set = getGlobalSettings();
    let spessore = tipo === 'imbottitura' ? set.i : (tipo === 'rinforzi' ? set.rSpess : set.legno);
    let layerName = tipo.toUpperCase(); 
    let colorCode = tipo === 'imbottitura' ? '5' : (tipo === 'legno' ? '30' : '3');
    
    let pianoW = 2500, pianoH = 1500;
    if(tipo === 'imbottitura') { 
        pianoW = 2000; 
        pianoH = 1000; 
    }

    const allPanels = nesting(pannelli, pianoW, pianoH);
    
    let dxf = `0\nSECTION\n2\nHEADER\n9\n$ACADVER\n1\nAC1015\n9\n$INSUNITS\n70\n4\n0\nENDSEC\n0\nSECTION\n2\nTABLES\n0\nTABLE\n2\nLAYER\n70\n2\n0\nLAYER\n2\n${layerName}\n70\n0\n62\n${colorCode}\n6\nCONTINUOUS\n0\nLAYER\n2\nQUOTE\n70\n0\n62\n7\n6\nCONTINUOUS\n0\nENDTAB\n0\nENDSEC\n0\nSECTION\n2\nENTITIES\n`;

    allPanels.forEach((panel, panelIdx) => {
        const offsetX = panelIdx * (pianoW + 200);
        
        // Disegna il perimetro del piano
        dxf += `0\nLWPOLYLINE\n8\nQUOTE\n90\n5\n70\n1\n10\n${offsetX}\n20\n0\n10\n${offsetX + pianoW}\n20\n0\n10\n${offsetX + pianoW}\n20\n${pianoH}\n10\n${offsetX}\n20\n${pianoH}\n10\n${offsetX}\n20\n0\n`;
        
        // Disegna i pezzi dentro il piano
        panel.forEach(p => {
            const x = offsetX + p.x; 
            const y = p.y; 
            const w = p.w; 
            const h = p.h;
            
            dxf += `0\nLWPOLYLINE\n8\n${layerName}\n90\n5\n70\n1\n10\n${x}\n20\n${y}\n10\n${x + w}\n20\n${y}\n10\n${x + w}\n20\n${y + h}\n10\n${x}\n20\n${y + h}\n10\n${x}\n20\n${y}\n`;
            
            // Testi informativi sul pezzo
            dxf += `0\nTEXT\n8\nQUOTE\n10\n${x + w/2 - 50}\n20\n${y + h/2}\n40\n30\n1\n${p.nome || ''}\n`;
            dxf += `0\nTEXT\n8\nQUOTE\n10\n${x + w/2 - 50}\n20\n${y + h/2 - 40}\n40\n25\n1\n${w.toFixed(0)}x${h.toFixed(0)}mm\n`;
        });
        
        // Etichetta del piano globale
        dxf += `0\nTEXT\n8\nQUOTE\n10\n${offsetX + 50}\n20\n${pianoH + 50}\n40\n40\n1\nPannello ${panelIdx + 1} - Spessore: ${spessore} mm\n`;
    });
    
    dxf += `0\nENDSEC\n0\nEOF`;

    const blob = new Blob([dxf], { type: 'application/dxf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); 
    a.href = url;
    a.download = `Nesting_${tipo}.dxf`;
    document.body.appendChild(a); 
    a.click(); 
    document.body.removeChild(a); 
    URL.revokeObjectURL(url);
}
</script>
