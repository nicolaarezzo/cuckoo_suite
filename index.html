<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuckoo Suite</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            background: #020617; 
            color: white; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            position: relative;
        }

        /* Menu Laterale della Suite */
        #suite-sidebar { 
            width: 260px; 
            box-sizing: border-box;
            background: #0f172a; 
            border-right: 1px solid #1e293b; 
            display: flex; 
            flex-direction: column; 
            padding: 30px 20px 20px 20px;
            z-index: 100;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        #suite-sidebar.collapsed {
            margin-left: -260px;
        }

        /* Linguetta a scomparsa */
        .toggle-tab-suite {
            position: absolute;
            right: -30px;
            top: 50%;
            transform: translateY(-50%);
            background: #1e293b;
            color: #94a3b8;
            padding: 20px 5px;
            cursor: pointer;
            border-radius: 0 8px 8px 0;
            z-index: 1000;
            font-weight: bold;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            border: 1px solid #334155;
            border-left: none;
            box-shadow: 2px 0 5px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        
        .toggle-tab-suite:hover {
            background: #3b82f6;
            color: white;
            border-color: #60a5fa;
        }

        .app-btn {
            background: transparent;
            color: #94a3b8;
            border: 1px solid transparent;
            padding: 15px;
            text-align: left;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .app-btn:hover { background: #1e293b; color: white; }

        /* Colori personalizzati per ogni modulo */
        .btn-cce:hover, .btn-cce.active { background: #f59e0b; color: white; border-color: #fbbf24; box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3); } /* Giallo */
        .btn-ccb:hover, .btn-ccb.active { background: #3b82f6; color: white; border-color: #60a5fa; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); } /* Blu */
        .btn-ccn:hover, .btn-ccn.active { background: #ef4444; color: white; border-color: #f87171; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3); } /* Rosso */
        .btn-ccv:hover, .btn-ccv.active { background: #8b5cf6; color: white; border-color: #a78bfa; box-shadow: 0 4px 10px rgba(139, 92, 246, 0.3); } /* Viola */

        /* CONTENITORE IFRAME MULTIPLI IN BACKGROUND */
        #frames-container {
            flex-grow: 1;
            position: relative;
            width: 100%;
            height: 100%;
            background: #0f172a;
        }

        .app-frame {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            display: none;
        }

        .app-frame.active {
            display: block;
        }

    </style>
</head>
<body>

    <div id="suite-sidebar">
        <div class="toggle-tab-suite" onclick="toggleSuiteSidebar()">MENU SUITE</div>
        
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 30px;">
            <img src="icon-192.png" alt="Logo" style="width: 40px; height: 40px; border-radius: 8px;" onerror="this.style.display='none'">
            <div>
                <h1 style="margin: 0; font-size: 18px; color: #e2e8f0;">Cuckoo Suite</h1>
                <div style="font-size: 11px; color: #3b82f6; font-weight: bold;">PRO EDITION</div>
            </div>
        </div>

        <button class="app-btn btn-cce active" onclick="loadApp('cce', this)">
            🥚 Cuckoo Egg
        </button>
        <button class="app-btn btn-ccb" onclick="loadApp('ccb', this)">
            📦 Cuckoo Box
        </button>
        <button class="app-btn btn-ccn" onclick="loadApp('ccn', this)">
            🚚 Cuckoo Nest
        </button>
        <button class="app-btn btn-ccv" onclick="loadApp('ccv', this)">
            📱 Cuckoo View
        </button>

        <div style="margin-top: auto; padding: 15px; background: #020617; border-radius: 8px; border: 1px solid #1e293b; font-size: 11px; color: #cbd5e1; line-height: 1.5;">
            <b style="color: #3b82f6; font-size: 12px;">🤖 Motore IA (Cuckoo Brain)</b><br>
            Per estrarre i dati in automatico dai PDF e dagli Excel disordinati ti serve una chiave API gratuita di Google Gemini.<br>
            <div style="margin-top: 8px; margin-bottom: 8px;">
                <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color: #10b981; text-decoration: none; font-weight: bold; background: rgba(16, 185, 129, 0.1); padding: 4px 8px; border-radius: 4px; border: 1px solid #10b981; display: inline-block;">👉 Ottieni l'API Key da qui</a>
            </div>
            <span style="color: #64748b;">Una volta creata e copiata, incollala nelle impostazioni (⚙️ AI & MEM) di Cuckoo Egg.</span>
        </div>
    </div>

    <div id="frames-container">
        <iframe id="frame-cce" class="app-frame active" src="cuckoo_egg.html"></iframe>
        <iframe id="frame-ccb" class="app-frame" src="cuckoo_box.html"></iframe>
        <iframe id="frame-ccn" class="app-frame" src="cuckoo_nest.html"></iframe>
        <iframe id="frame-ccv" class="app-frame" src="cuckoo_view.html"></iframe>
    </div>

    <script>
        function toggleSuiteSidebar() {
            document.getElementById('suite-sidebar').classList.toggle('collapsed');
        }

        function loadApp(appId, btnElement) {
            // Spegne tutte le schede
            document.querySelectorAll('.app-frame').forEach(f => f.classList.remove('active'));
            // Accende solo quella richiesta senza ricaricare la pagina
            document.getElementById('frame-' + appId).classList.add('active');
            
            // Aggiorna grafica bottoni
            let btns = document.querySelectorAll('.app-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            // Auto-collapse su schermi piccoli
            if (window.innerWidth < 1000) {
                document.getElementById('suite-sidebar').classList.add('collapsed');
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .catch(err => console.log('Errore SW', err));
            });
        }
    </script>
</body>
</html>
