<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuckoo Suite</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            background: #020617; 
            color: white; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            position: relative;
        }

        /* Menu Laterale della Suite */
        #suite-sidebar { 
            width: 260px; 
            box-sizing: border-box;
            background: #0f172a; 
            border-right: 1px solid #1e293b; 
            display: flex; 
            flex-direction: column; 
            padding: 30px 20px 20px 20px;
            z-index: 100;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-left: 0;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        #suite-sidebar.collapsed {
            margin-left: -260px;
            box-shadow: none;
        }

        .suite-logo {
            font-size: 24px;
            font-weight: 900;
            color: #e2e8f0;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }
        .suite-subtitle {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 40px;
        }

        .nav-label {
            font-size: 10px;
            color: #475569;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* Pulsanti delle App */
        .app-btn {
            background: transparent;
            color: #94a3b8;
            border: 1px solid transparent;
            padding: 10px 15px;
            border-radius: 8px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .app-btn:hover {
            background: #1e293b;
            color: white;
        }

        /* Linguetta di default (Azzurra per Cuckoo Nest) */
        .app-btn.active {
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
            box-shadow: inset 4px 0 0 #3b82f6; 
        }

        /* Linguetta specifica per Cuckoo Box (Rossa) */
        .app-btn.active.box-btn { 
            box-shadow: inset 4px 0 0 #ef4444; 
        }

        /* Linguetta specifica per Cuckoo View (Verde) */
        .app-btn.active.view-btn { 
            box-shadow: inset 4px 0 0 #10b981; 
        }

        .app-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            object-fit: cover;
        }

        /* Pulsante Fluttuante Menu - Spostato in Basso a Destra */
        #toggleSuiteBtn {
            position: absolute;
            bottom: 25px;
            right: 25px;
            z-index: 1000;
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 50px; /* Forma a pillola */
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: 0.3s transform, 0.3s background;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        #toggleSuiteBtn:hover {
            background: #2563eb;
            transform: translateY(-3px); /* Effetto sollevamento al passaggio del mouse */
        }

        /* Contenitore App iframe */
        #app-frame {
            flex-grow: 1;
            border: none;
            background: #0f172a;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="suite-sidebar">
        <div class="suite-logo">Cuckoo Suite</div>
        <div class="suite-subtitle">Sistema Integrato</div>

        <div class="nav-label">LE TUE APPLICAZIONI</div>

        <button class="app-btn box-btn active" onclick="loadApp('cuckoo_box.html', this)">
            <img src="icon-box.png" alt="CB" class="app-icon" onerror="this.style.display='none'"> 
            Cuckoo Box
        </button>
        
        <button class="app-btn nest-btn" onclick="loadApp('cuckoo_nest.html', this)">
            <img src="icon-nest.png" alt="CN" class="app-icon" onerror="this.style.display='none'"> 
            Cuckoo Nest
        </button>

        <button class="app-btn view-btn" onclick="loadApp('cuckoo_view.html', this)">
            <img src="icon-192.png" alt="CV" class="app-icon" onerror="this.style.display='none'"> 
            Cuckoo View
        </button>

        <div style="margin-top: auto; padding: 15px; background: #020617; border-radius: 8px; border: 1px solid #1e293b; font-size: 11px; color: #64748b;">
            💡 <b>Info:</b> Nascondi questo menu per avere il 100% dello spazio per i modelli 3D.
        </div>
    </div>

    <iframe id="app-frame" src="cuckoo_box.html"></iframe>

    <button id="toggleSuiteBtn" onclick="toggleSuiteSidebar()">☰ MENU APP</button>

    <script>
        function toggleSuiteSidebar() {
            document.getElementById('suite-sidebar').classList.toggle('collapsed');
        }

        function loadApp(url, btnElement) {
            document.getElementById('app-frame').src = url;
            
            let btns = document.querySelectorAll('.app-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            // Chiude il menu automaticamente sui display più piccoli
            if (window.innerWidth < 1000) {
                document.getElementById('suite-sidebar').classList.add('collapsed');
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Suite Service Worker Registrato!'))
                    .catch(err => console.log('Errore SW:', err));
            });
        }
    </script>
</body>
</html>
