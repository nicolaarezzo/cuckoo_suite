<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuckoo Suite</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            background: #020617; 
            color: white; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            position: relative;
        }

        /* Menu Laterale della Suite */
        #suite-sidebar { 
            width: 260px; 
            box-sizing: border-box;
            background: #0f172a; 
            border-right: 1px solid #1e293b; 
            display: flex; 
            flex-direction: column; 
            padding: 30px 20px 20px 20px;
            z-index: 100;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        #suite-sidebar.collapsed {
            margin-left: -260px;
        }

        /* Linguetta a scomparsa */
        .toggle-tab-suite {
            position: absolute;
            right: -30px;
            top: 50%;
            transform: translateY(-50%);
            background: #1e293b;
            color: #94a3b8;
            padding: 20px 5px;
            cursor: pointer;
            border-radius: 0 8px 8px 0;
            z-index: 1000;
            font-weight: bold;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            border: 1px solid #334155;
            border-left: none;
            box-shadow: 2px 0 5px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        
        .toggle-tab-suite:hover {
            background: #3b82f6;
            color: white;
            border-color: #60a5fa;
        }

        .app-btn {
            background: transparent;
            color: #94a3b8;
            border: 1px solid transparent;
            padding: 15px;
            text-align: left;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .app-btn:hover { background: #1e293b; color: white; }

.btn-ctrl { 
    padding: 8px; border-radius: 6px; border: none; color: white; 
    font-weight: bold; font-size: 10px; cursor: pointer; transition: 0.2s; 
}
.btn-ctrl:hover { filter: brightness(1.2); }

        /* Colori personalizzati per ogni modulo */
        .btn-cce:hover, .btn-cce.active { background: #f59e0b; color: white; border-color: #fbbf24; box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3); } /* Giallo */
        .btn-ccb:hover, .btn-ccb.active { background: #3b82f6; color: white; border-color: #60a5fa; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); } /* Blu */
        .btn-ccn:hover, .btn-ccn.active { background: #ef4444; color: white; border-color: #f87171; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3); } /* Rosso */
        .btn-ccv:hover, .btn-ccv.active { background: #8b5cf6; color: white; border-color: #a78bfa; box-shadow: 0 4px 10px rgba(139, 92, 246, 0.3); } /* Viola */

        /* CONTENITORE IFRAME MULTIPLI IN BACKGROUND */
        #frames-container {
            flex-grow: 1;
            position: relative;
            width: 100%;
            height: 100%;
            background: #0f172a;
        }

        .app-frame {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            display: none;
        }

        .app-frame.active {
            display: block;
        }

    </style>
</head>
<body>

    <div id="suite-sidebar">
        <div class="toggle-tab-suite" onclick="toggleSuiteSidebar()">MENU SUITE</div>
        
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 30px;">
            <img src="icon-192.png" alt="Logo" style="width: 40px; height: 40px; border-radius: 8px;" onerror="this.style.display='none'">
            <div>
                <h1 style="margin: 0; font-size: 18px; color: #e2e8f0;">Cuckoo Suite</h1>
                <div style="font-size: 11px; color: #3b82f6; font-weight: bold;">PRO EDITION</div>
            </div>
        </div>

<!-- Trova il div #suite-sidebar e aggiungi questa sezione prima dei bottoni app-btn -->
<div style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #1e293b;">
    <label style="font-size: 9px; color: #64748b; letter-spacing: 1px;">GESTIONE PROGETTO</label>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 5px;">
        <button class="btn-ctrl" onclick="nuovoProgetto()" style="background: #ef4444;" title="Nuovo Progetto (Pulisce tutto)">🆕 NUOVO</button>
        <button class="btn-ctrl" onclick="document.getElementById('fileInpMaster').click()" style="background: #334155;">📂 APRI</button>
    </div>
    <button class="btn-ctrl" onclick="salvaMaster()" style="background: #3b82f6; width: 100%; margin-top: 5px;">💾 SALVA MASTER PROJECT</button>
    <input type="file" id="fileInpMaster" accept=".ccsf" style="display: none;" onchange="caricaMaster(event)">
</div>

        <button class="app-btn btn-ccv active" onclick="loadApp('ccv', this)">
            📱 Cuckoo View
        </button>

        <button class="app-btn btn-cce" onclick="loadApp('cce', this)">
            🥚 Cuckoo Egg
        </button>

        <button class="app-btn btn-ccb" onclick="loadApp('ccb', this)">
            📦 Cuckoo Box
        </button>

        <button class="app-btn btn-ccn" onclick="loadApp('ccn', this)">
            🚚 Cuckoo Nest
        </button>

        <div style="margin-top: auto; padding: 15px; background: #020617; border-radius: 8px; border: 1px solid #1e293b; font-size: 11px; color: #cbd5e1; line-height: 1.5;">
            <b style="color: #3b82f6; font-size: 12px;">🤖 Motore IA (Cuckoo Brain)</b><br>
            Per estrarre i dati in automatico dai PDF e dagli Excel disordinati ti serve una chiave API gratuita di Google Gemini.<br>
            <div style="margin-top: 8px; margin-bottom: 8px;">
                <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color: #10b981; text-decoration: none; font-weight: bold; background: rgba(16, 185, 129, 0.1); padding: 4px 8px; border-radius: 4px; border: 1px solid #10b981; display: inline-block;">👉 Ottieni l'API Key da qui</a>
            </div>
            <span style="color: #64748b;">Una volta creata e copiata, incollala nelle impostazioni (⚙️ AI & MEM) di Cuckoo Egg.</span>
        </div>
    </div>

    <div id="frames-container">
        <iframe id="frame-ccv" class="app-frame active" src="cuckoo_view.html"></iframe>
        <iframe id="frame-cce" class="app-frame" src="cuckoo_egg.html"></iframe>
        <iframe id="frame-ccb" class="app-frame" src="cuckoo_box.html"></iframe>
        <iframe id="frame-ccn" class="app-frame" src="cuckoo_nest.html"></iframe>
    </div>

    <script>
        // --- AUTO-PULIZIA ALL'AVVIO DELLA SUITE ---
(function() {
    // Controlliamo se questa è una NUOVA sessione (appena aperta) 
    // o se l'utente ha solo ricaricato la pagina (Refresh)
    if (!sessionStorage.getItem('cuckoo_suite_session_active')) {
        
        // Elenco dei dati temporanei del progetto da eliminare
        const projectKeys = [
            'cuckoo_egg_db',                // Database opere (CCE)
            'cuckoo_box_import_queue',      // Code produzione (CCB)
            'cuckoo_nest_transfer_queue',   // Banchina carico (CCN)
            'cuckoo_view_transfer_data'     // Hub della vista (CCV)
        ];

        // Cancelliamo solo questi dati
        projectKeys.forEach(key => localStorage.removeItem(key));

        // NOTA: Non tocchiamo 'cuckoo_nest_capienza_presets' 
        // né 'cuckoo_nest_last_preset', così i tuoi camion restano salvati.

        // Segniamo che la sessione è ora attiva. 
        // Finché la scheda del browser resta aperta, i dati non verranno più cancellati al refresh.
        sessionStorage.setItem('cuckoo_suite_session_active', 'true');
        
        console.log("🚀 Nuova sessione: Project data azzerato. Mezzi CCN preservati.");
    } else {
        console.log("🔄 Sessione ripristinata: Dati mantenuti.");
    }
})();
        // --- GESTIONE INTERFACCIA ---
        function toggleSuiteSidebar() {
            document.getElementById('suite-sidebar').classList.toggle('collapsed');
        }

        function loadApp(appId, btnElement) {
            // Nasconde tutti i frame
            document.querySelectorAll('.app-frame').forEach(f => f.classList.remove('active'));
            // Mostra quello selezionato
            document.getElementById('frame-' + appId).classList.add('active');
            
            // Aggiorna lo stato dei bottoni
            let btns = document.querySelectorAll('.app-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            // Chiude la sidebar su mobile dopo il click
            if (window.innerWidth < 1000) {
                document.getElementById('suite-sidebar').classList.add('collapsed');
            }
        }

        // --- GESTIONE PROGETTO (NUOVE FUNZIONI) ---
        function nuovoProgetto() {
            if(confirm("⚠️ AZIONE IRREVERSIBILE\nVuoi cancellare tutti i dati (Opere, Casse, Viaggi) per iniziare un nuovo progetto?")) {
                const keysToClear = [
                    'cuckoo_egg_db', 
                    'cuckoo_box_import_queue', 
                    'cuckoo_nest_transfer_queue', 
                    'cuckoo_view_transfer_data'
                ];
                keysToClear.forEach(key => localStorage.removeItem(key));
                alert("✨ Memoria dati pulita. I mezzi personalizzati sono stati mantenuti.");
                window.location.reload(); 
            }
        }

        function salvaMaster() {
            // 1. Raccoglie i dati attuali da tutti i moduli (Egg, Box, Nest, View)
            const projectData = {
                cce: JSON.parse(localStorage.getItem('cuckoo_egg_db') || '[]'),
                ccb_queue: JSON.parse(localStorage.getItem('cuckoo_box_import_queue') || '[]'),
                ccn_queue: JSON.parse(localStorage.getItem('cuckoo_nest_transfer_queue') || '[]'),
                view_data: JSON.parse(localStorage.getItem('cuckoo_view_transfer_data') || '{}'),
                timestamp: new Date().toISOString()
            };

            // 2. Converte l'oggetto in testo JSON e lo cripta in Base64 per pulizia
            const jsonStr = JSON.stringify(projectData);
            const b64Data = btoa(unescape(encodeURIComponent(jsonStr)));
            
            // 3. Chiede all'utente come chiamare il file
            let nomeFile = prompt("Salva Progetto CCSF\nInserisci il nome del file:", "Progetto_Logistica");
            if (nomeFile === null || nomeFile.trim() === "") return; // Esce se l'utente annulla

            // 4. Crea il file fisico (Blob) con i dati Base64
            const blob = new Blob([b64Data], {type: "text/plain"});
            const url = URL.createObjectURL(blob);
            
            // 5. Simula il download del file con estensione .ccsf
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            // Pulisce il nome file eliminando spazi brutti
            a.download = nomeFile.replace(/\s+/g, '_') + ".ccsf"; 
            
            document.body.appendChild(a);
            a.click();
            
            // 6. Pulizia finale della memoria
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }

        function caricaMaster(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    // 1. Legge il contenuto del file .ccsf (testo Base64)
                    const b64 = e.target.result;
                    
                    // 2. Decodifica i dati in un oggetto JSON
                    const data = JSON.parse(decodeURIComponent(escape(atob(b64))));

                    // 3. Verifica minima: se non ci sono opere né dati vista, il file è sbagliato
                    if(!data.cce && !data.view_data) throw new Error();

                    // 4. Scrive i dati nel localStorage (sovrascrive il lavoro precedente)
                    if(data.cce) localStorage.setItem('cuckoo_egg_db', JSON.stringify(data.cce));
                    if(data.ccb_queue) localStorage.setItem('cuckoo_box_import_queue', JSON.stringify(data.ccb_queue));
                    if(data.ccn_queue) localStorage.setItem('cuckoo_nest_transfer_queue', JSON.stringify(data.ccn_queue));
                    if(data.view_data) localStorage.setItem('cuckoo_view_transfer_data', JSON.stringify(data.view_data));

                    // 5. Feedback e ricarica della Suite per pulire i buffer
                    alert("✅ Progetto .CCSF caricato con successo!");
                    window.location.reload();

                } catch(err) {
                    alert("❌ Errore: Il file selezionato non è un formato .ccsf valido o è danneggiato.");
                    console.error("Errore import:", err);
                }
            };
            reader.readAsText(file);
            
            // Resetta l'input per permettere di ricaricare lo stesso file se necessario
            event.target.value = "";
        }

        // --- SERVICE WORKER (OPZIONALE) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error', err));
            });
        }
    </script>
</body>
</html>
