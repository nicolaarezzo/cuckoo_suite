<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuckoo Suite</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            background: #020617; 
            color: white; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            position: relative;
        }

        /* Menu Laterale della Suite */
        #suite-sidebar { 
            width: 260px; 
            box-sizing: border-box;
            background: #0f172a; 
            border-right: 1px solid #1e293b; 
            display: flex; 
            flex-direction: column; 
            padding: 30px 20px 20px 20px;
            z-index: 100;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        #suite-sidebar.collapsed {
            margin-left: -260px;
        }

        #toggleSuiteBtn {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 900;
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: none; 
        }

        @media (max-width: 1000px) {
            #suite-sidebar {
                position: absolute;
                height: 100%;
                box-shadow: 4px 0 15px rgba(0,0,0,0.5);
            }
            #toggleSuiteBtn {
                display: block;
            }
            #suite-sidebar.collapsed + #toggleSuiteBtn {
                display: block; 
            }
        }

        .app-btn {
            background: transparent;
            color: #94a3b8;
            border: 1px solid transparent;
            padding: 15px;
            text-align: left;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.2s;
        }
        
        .app-btn:hover { background: #1e293b; color: white; }
        .app-btn.active { background: #3b82f6; color: white; border-color: #60a5fa; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }

        /* NUOVO CONTENITORE IFRAME MULTIPLI IN BACKGROUND */
        #frames-container {
            flex-grow: 1;
            position: relative;
            width: 100%;
            height: 100%;
            background: #0f172a;
        }

        .app-frame {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            display: none;
        }

        .app-frame.active {
            display: block;
        }

    </style>
</head>
<body>

    <div id="suite-sidebar">
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 30px;">
            <img src="icon-192.png" alt="Logo" style="width: 40px; height: 40px; border-radius: 8px;" onerror="this.style.display='none'">
            <div>
                <h1 style="margin: 0; font-size: 18px; color: #e2e8f0;">Cuckoo Suite</h1>
                <div style="font-size: 11px; color: #3b82f6; font-weight: bold;">PRO EDITION</div>
            </div>
        </div>

        <button class="app-btn active" onclick="loadApp('ccb', this)">
            📦 Produzione (CCB)
        </button>
        <button class="app-btn" onclick="loadApp('ccn', this)">
            🚚 Logistica (CCN)
        </button>
        <button class="app-btn" onclick="loadApp('ccv', this)">
            📱 Visualizzatore (CCV)
        </button>

        <div style="margin-top: auto; padding: 15px; background: #020617; border-radius: 8px; border: 1px solid #1e293b; font-size: 11px; color: #64748b;">
            💡 <b>Info:</b> L'app ora mantiene le pagine in background. Non perderai il lavoro cambiando finestra.
        </div>
    </div>

    <div id="frames-container">
        <iframe id="frame-ccb" class="app-frame active" src="cuckoo_box.html"></iframe>
        <iframe id="frame-ccn" class="app-frame" src="cuckoo_nest.html"></iframe>
        <iframe id="frame-ccv" class="app-frame" src="cuckoo_view.html"></iframe>
    </div>

    <button id="toggleSuiteBtn" onclick="toggleSuiteSidebar()">☰ MENU APP</button>

    <script>
        function toggleSuiteSidebar() {
            document.getElementById('suite-sidebar').classList.toggle('collapsed');
        }

        function loadApp(appId, btnElement) {
            // Spegne tutte le schede
            document.querySelectorAll('.app-frame').forEach(f => f.classList.remove('active'));
            // Accende solo quella richiesta senza ricaricare la pagina
            document.getElementById('frame-' + appId).classList.add('active');
            
            // Aggiorna grafica bottoni
            let btns = document.querySelectorAll('.app-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            if (window.innerWidth < 1000) {
                document.getElementById('suite-sidebar').classList.add('collapsed');
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .catch(err => console.log('Errore SW', err));
            });
        }
    </script>
</body>
</html>
